.cc-choice-price{font-family:'Jost',sans-serif;font-size:13px;color:#7C1F15;font-weight:700;}
.cc-choice-sub{font-size:13.5px;line-height:1.5;color:#3A4654;}
.cc-choice-tag{margin-top:4px;font-size:11.5px;font-weight:700;color:#A52B1E;
  background:#FBE9E6;border:1px solid #E2B4AC;border-radius:0;padding:3px 8px;}
/* manager: sale-mode picker */
.cc-modes{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin:4px 0 16px;}
.cc-modecard{display:flex;flex-direction:column;gap:4px;position:relative;cursor:pointer;
  background:#FFFFFF;border:1.5px solid #C8D2DC;border-radius:0;padding:13px 14px 14px 36px;}
.cc-modecard.on{border-color:#06273A;box-shadow:3px 3px 0 rgba(6,39,58,0.14);}
.cc-modecard input{position:absolute;left:13px;top:15px;}
.cc-modecard-h{font-family:'Playfair Display',serif;font-weight:800;font-size:14.5px;color:#06273A;}
.cc-modecard-sub{font-size:12px;line-height:1.45;color:#5A6B7A;}
/* tabled-event seat buying */
.cc-table-buy{display:flex;justify-content:space-between;align-items:center;gap:12px;
  margin-top:14px;flex-wrap:wrap;}
.cc-table-actions{display:flex;gap:8px;flex-wrap:wrap;margin-top:10px;}
.cc-table-summary{display:flex;justify-content:space-between;align-items:center;gap:12px;
  background:#FFFFFF;border:1.5px solid #06273A;border-radius:0;padding:13px 15px;flex-wrap:wrap;}
.cc-holdtimer{display:inline-block;background:#FBE9A8;color:#7A5E12;border:1px solid #E9B949;
  border-radius:0;font-family:'Jost',sans-serif;font-size:13px;font-weight:700;
  padding:7px 13px;margin-bottom:14px;}
.cc-seatlist{display:flex;flex-direction:column;gap:6px;margin-bottom:16px;}
.cc-seat{display:flex;justify-content:space-between;align-items:center;gap:10px;
  background:#FFFFFF;border:1.5px solid #C8D2DC;border-radius:0;padding:9px 13px;font-size:13.5px;color:#2A3743;}
.cc-seat.paid{border-color:#2E7D52;background:#E6F3EC;}
.cc-seat-n{font-family:'Jost',sans-serif;font-size:11px;letter-spacing:.06em;color:#5A6B7A;}
.cc-seat-name{font-weight:700;color:#1F5135;}
.cc-seat-open{color:#8893A0;font-style:italic;}
.cc-confirm-card{background:#FFFFFF;border:2px solid #2E7D52;border-radius:0;
  padding:22px 24px;color:#1F5135;max-width:520px;}
.cc-confirm-card p{color:#2A3743;font-size:14.5px;line-height:1.5;margin:6px 0 14px;}
.cc-confirm-badge{display:inline-block;font-family:'Playfair Display',serif;font-weight:800;
  font-size:17px;color:#1F5135;margin-bottom:6px;}
.cc-reg-subhead{font-family:'Playfair Display',serif;font-weight:800;font-size:15px;color:#FFFFFF;
  margin:6px 0 12px;}
.cc-holdcard{background:#FFFFFF;border:1.5px solid #06273A;border-radius:0;
  padding:16px 18px;margin-bottom:12px;box-shadow:4px 4px 0 rgba(6,39,58,0.16);}
.cc-holdcard-head{display:flex;justify-content:space-between;align-items:center;gap:10px;flex-wrap:wrap;}
.cc-holdcard-head b{color:#06273A;font-size:16px;}
.cc-holdcard-head .cc-mono{color:#5A6B7A;font-size:12.5px;}
.cc-holdcard-body{display:flex;gap:16px;flex-wrap:wrap;margin-top:8px;font-size:13.5px;color:#3A4654;}
.cc-holdcard-body b{color:#06273A;}
.cc-holdcard-seats{display:flex;gap:6px;flex-wrap:wrap;margin-top:11px;}
.cc-seatpill{font-family:'Jost',sans-serif;font-size:11px;background:#EEF1F4;
  border:1px solid #C8D2DC;color:#8893A0;border-radius:0;padding:3px 9px;}
.cc-seatpill.paid{background:#E6F3EC;border-color:#2E7D52;color:#1F5135;font-weight:700;}
.cc-holdcard-actions{display:flex;gap:8px;margin-top:13px;}
.cc-holdcard .cc-mini{border-color:#06273A;color:#06273A;}
.cc-holdcard .cc-mini:hover{background:#b0a986;color:#06273A;border-color:#b0a986;}
.cc-holdcard .cc-mini.danger:hover{background:#A52B1E;color:#fff;border-color:#A52B1E;}
.cc-holdstatus{font-family:'Jost',sans-serif;font-size:11px;letter-spacing:.04em;
  border-radius:0;padding:3px 9px;font-weight:700;}
.cc-holdstatus.s-holding{background:#FBE9A8;color:#7A5E12;border:1px solid #E9B949;}
.cc-holdstatus.s-booked{background:#E6F3EC;color:#1F5135;border:1px solid #2E7D52;}
.cc-holdstatus.s-released,.cc-holdstatus.s-expired{background:#EEF1F4;color:#5A6B7A;border:1px solid #C8D2DC;}

@media (max-width:760px){
  .cc-admin-shell{flex-direction:column;gap:16px;}
  .cc-side{position:static;top:auto;width:100%;flex-basis:auto;}
  .cc-side .cc-nav{flex-direction:row;flex-wrap:wrap;}
  .cc-side .cc-nav-item{width:auto;}
  .cc-side-exit{margin-top:14px;}
  .cc-book-grid{grid-template-columns:1fr;}
  .cc-choice-grid{grid-template-columns:1fr;}
  .cc-modes{grid-template-columns:1fr;}
  .cc-detail-actions{width:100%;}
  .cc-summary{position:static;}
  .cc-stats{grid-template-columns:1fr 1fr;}
  .cc-tr,.cc-table-reg .cc-tr{grid-template-columns:1fr 1fr;}
  .cc-tr span:nth-child(n+3){grid-column:span 1;}
  .cc-tr-head{display:none;}
  .cc-row3{grid-template-columns:1fr;}
}
@media (prefers-reduced-motion:reduce){
  .cc-ticket,.cc-btn{transition:none;}
}

/* ---- unified buttons: solid yellow, lighter yellow on hover ---- */
.cc-btn,.cc-btn-wax,.cc-btn-ghost,.cc-mini,.cc-share-btn{
  background:#e2d827;color:#06273A;border-color:#e2d827;transition:background .12s,border-color .12s;}
.cc-btn:hover,.cc-btn-wax:hover,.cc-btn-ghost:hover,.cc-mini:hover,
.cc-table .cc-mini:hover,.cc-edit .cc-mini:hover,.cc-regcard .cc-mini:hover,
.cc-holdcard .cc-mini:hover,.cc-share-btn:hover{
  background:#f2ed83;color:#06273A;border-color:#f2ed83;}
/* keep destructive (delete/remove) buttons red so they stay distinct */
.cc-mini.danger,.cc-regcard .cc-mini.danger,.cc-table .cc-mini.danger,
.cc-edit .cc-mini.danger,.cc-holdcard .cc-mini.danger{
  background:transparent;color:#A52B1E;border-color:#A52B1E;}
.cc-mini.danger:hover,.cc-regcard .cc-mini.danger:hover,.cc-table .cc-mini.danger:hover,
.cc-edit .cc-mini.danger:hover,.cc-holdcard .cc-mini.danger:hover{
  background:#A52B1E;color:#fff;border-color:#A52B1E;}
.cc-btn-wax:disabled,.cc-btn:disabled{
  background:#EDE3CB;color:#9a8c76;border-color:#EDE3CB;cursor:not-allowed;}

/* =====================================================================
   Classic refinements — serif display type, squared corners, thin
   borders, soft shadows. Elegant/classic pass inspired by
   greyscheese.com.
   ===================================================================== */
/* headings: calmer serif weight, no tight tracking */
.cc-h1{font-weight:700;letter-spacing:0;line-height:1.08;}
.cc-h2{font-weight:600;letter-spacing:0;line-height:1.12;}
.cc-brand{font-weight:700;letter-spacing:.02em;}
.cc-brand-mark{border-radius:0;transform:none;}
/* buttons: squared, uppercase, letterspaced — like "ORDER NOW" on the brand site */
.cc-btn{font-family:'Jost',sans-serif;font-weight:600;font-size:12.5px;
  text-transform:uppercase;letter-spacing:.16em;padding:12px 26px;border-width:1px;}
.cc-mini{font-family:'Jost',sans-serif;font-weight:600;font-size:11px;
  text-transform:uppercase;letter-spacing:.12em;padding:6px 13px;border-width:1px;}
.cc-tab{font-family:'Jost',sans-serif;font-weight:600;font-size:12px;
  text-transform:uppercase;letter-spacing:.12em;}
.cc-modeswitch{border-width:1px;}
.cc-stepper{border-width:1px;}
.cc-stepper button{border-radius:0;}
.cc-loc{font-family:'Playfair Display',serif;font-weight:600;border-width:1px;letter-spacing:.02em;}
.cc-share-btn{font-family:'Jost',sans-serif;font-weight:600;text-transform:uppercase;letter-spacing:.12em;font-size:12px;}
/* cards: thin borders, soft depth instead of hard offset shadows */
.cc-ticket,.cc-summary-card,.cc-confirm-ticket,.cc-login,.cc-stat,.cc-table,
.cc-side,.cc-gallery img,.cc-edit,.cc-report,.cc-regcard,.cc-choice,
.cc-form-frame .cc-section,.cc-holdcard,.cc-table-summary,.cc-seatpanel{border-width:1px;}
.cc-ticket,.cc-summary-card,.cc-confirm-ticket,.cc-login,.cc-side,.cc-gallery img{
  box-shadow:0 12px 32px rgba(2,16,25,.35);}
.cc-ticket:hover{transform:none;box-shadow:0 16px 40px rgba(2,16,25,.5);}
.cc-ticket.out:hover{box-shadow:0 12px 32px rgba(2,16,25,.35);}
.cc-form-frame .cc-section,.cc-holdcard{box-shadow:0 6px 18px rgba(2,16,25,.14);}
.cc-choice{box-shadow:0 6px 18px rgba(2,16,25,.14);}
.cc-choice:hover:not(:disabled){transform:none;box-shadow:0 10px 26px rgba(2,16,25,.22);}
.cc-modecard.on{box-shadow:0 6px 18px rgba(2,16,25,.14);}
/* inputs: hairline borders */
.cc-input,.cc-check{border-width:1px;}
/* small-caps labels read best a touch bolder in Jost */
.cc-eyebrow,.cc-section-label,.cc-side-eyebrow,.cc-side-label{font-weight:500;}
`}</style>
  );
}
