const money = (cents) =>
  "$" + (cents / 100).toFixed(2).replace(/\.00$/, "");

const fmtDate = (iso) => {
  const d = new Date(iso + "T00:00:00");
  return d.toLocaleDateString(undefined, {
    weekday: "short",
    month: "short",
    day: "numeric",
  });
};
const fmtDateLong = (iso) => {
  const d = new Date(iso + "T00:00:00");
  return d.toLocaleDateString(undefined, {
    weekday: "long",
    month: "long",
    day: "numeric",
    year: "numeric",
  });
};
// "18:00" → "6:00 PM"
const fmtTime = (t) => {
  if (!t) return "";
  const [h, m] = String(t).split(":").map(Number);
  if (isNaN(h)) return t;
  const ap = h < 12 ? "AM" : "PM";
  const h12 = ((h + 11) % 12) + 1;
  return `${h12}:${String(m || 0).padStart(2, "0")} ${ap}`;
};
const dayNum = (iso) => new Date(iso + "T00:00:00").getDate();
const monShort = (iso) =>
  new Date(iso + "T00:00:00")
    .toLocaleDateString(undefined, { month: "short" })
    .toUpperCase();
// Today as a local YYYY-MM-DD string (for archiving past classes by date).
const todayStr = () => {
  const d = new Date();
  return `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(
    2,
    "0"
  )}-${String(d.getDate()).padStart(2, "0")}`;
};

const uid = (p = "id") =>

  Math.random().toString(36).slice(2, 8) + Math.random().toString(36).slice(2, 6);

// Seats on a hold that have been paid for, and whether the table is full.
const seatsPaid = (h) => (h.seats || []).filter((s) => s && s.paid).length;
const holdFull = (h) => seatsPaid(h) >= (h.partySize || 0);
const holdLive = (h) =>
  h.status === "held" && new Date(h.expiresAt) > new Date();
// "1d 4h" / "5h 12m" / "8m" until a hold expires (or "expired").
const timeLeft = (iso) => {
  const ms = new Date(iso).getTime() - Date.now();
  if (ms <= 0) return "expired";
  const mins = Math.floor(ms / 60000);
  const d = Math.floor(mins / 1440);
  const h = Math.floor((mins % 1440) / 60);
  const m = mins % 60;
  if (d) return `${d}d ${h}h`;
  if (h) return `${h}h ${m}m`;
  return `${m}m`;
};

// A member shows as first-initial + first 3 of last name, e.g. "B.BAR".
const initialsLabel = (first, last) =>

// Summarize an event's existing groups: [{ name, members:["B.BAR", ...] }].
const groupSummary = (eventRegs) => {
  const map = {};
  eventRegs
    .filter((r) => !r.refunded && r.group)
    .forEach((r) => {
      const members =
        r.guests && r.guests.length
          ? r.guests

// Build + send a confirmation email after a booking. No-op until sendUrl is set.
async function sendConfirmationEmail(reg, ev, payInfo) {
  if (!EMAIL.sendUrl || !ev) return;
  const to = EMAIL.mode === "test" ? EMAIL.testTo : reg.email;
  if (!to) return;
  const row = (k, v) =>
    `<tr><td style="padding:4px 0;color:#555">${k}</td>` +
    `<td style="padding:4px 0;text-align:right"><b>${v}</b></td></tr>`;
  const line = (k, v) =>
    `<tr><td style="padding:2px 0;color:#333">${k}</td>` +
    `<td style="padding:2px 0;text-align:right">${v}</td></tr>`;
  const guestItems = (reg.guests || [])
    .map((g) => {
      const nm = `${g.first} ${g.last}`.trim();
      const opts = (g.option || "")
        .split(",")
        .map((s) => s.trim())
        .filter(Boolean);
      const rows =
        line("General admission", money(ev.price)) +
        opts
          .map((o) => {
            const a = (ev.addOns || []).find((x) => x.name === o);
            return line(o, "+ " + money(a ? a.price : 0));
          })
          .join("");
      return `<p style="margin:12px 0 2px"><b>${nm}</b></p><table style="width:100%;border-collapse:collapse;font-size:13px">${rows}</table>`;
    })
    .join("");
  const share = bookingLink(reg.id);
  // For a tabled event, invite others to buy the remaining seats on this table.
  const tableInvite =
    ev.kind === "event_tabled" && reg.group ? groupLink(ev.id, reg.group) : "";
  const html = `
    <div style="font-family:Arial,sans-serif;max-width:520px;margin:0 auto;color:#06273a">
      <h2 style="margin:0 0 4px">${ev.title}</h2>
      <p style="margin:0 0 4px;color:#555">${fmtDateLong(ev.date)} · ${fmtTime(ev.time)}</p>
      <p style="margin:0 0 16px;color:#555"><b>📍 GREYS ${ev.location || "Memphis"}</b></p>
      <p>Hi ${reg.name}, your booking is confirmed. Confirmation code <b>${reg.code}</b>.</p>
      ${
        guestItems
          ? `<p style="margin:14px 0 4px"><b>Itemized</b></p>${guestItems}`
          : ""
      }
      <table style="width:100%;border-top:1px solid #ddd;margin-top:14px">
        ${row("Tickets", reg.qty)}
        ${reg.group ? row("Group", reg.group) : ""}
        ${payInfo && payInfo.subtotal != null ? row("Subtotal", money(payInfo.subtotal)) : ""}
        ${payInfo && payInfo.tax ? row("Sales tax", money(payInfo.tax)) : ""}
        ${payInfo && payInfo.fee ? row("Processing fee", money(payInfo.fee)) : ""}
        ${row("<b>Total</b>", "<b>" + money(reg.total) + "</b>")}
        ${
          payInfo && (payInfo.gift || payInfo.card)
            ? `<tr><td colspan="2" style="padding:10px 0 2px;color:#777;font-size:11px;text-transform:uppercase;letter-spacing:.06em">Payment</td></tr>` +
              (payInfo.gift ? row("Gift card", "− " + money(payInfo.gift)) : "") +
              (payInfo.card ? row("Card" + (payInfo.last4 ? " ····" + payInfo.last4 : ""), money(payInfo.card)) : "")
            : ""
        }
      </table>
      ${
        tableInvite
          ? `<p style="margin:18px 0 4px"><b>Invite the rest of your table</b></p>
             <p style="margin:0 0 4px;color:#555">Buying fewer than a full table? Send this link so others claim the open seats on table ${reg.group}:</p>
             <p style="margin:0 0 10px"><a href="${tableInvite}" style="color:#7c1f15">${tableInvite}</a></p>`
          : ""
      }
      ${
        share
          ? `<p style="margin:18px 0 4px"><b>Share with your guests</b></p>
             <p style="margin:0 0 4px;color:#555">Anyone with this link can see the full booking details:</p>
             <p style="margin:0"><a href="${share}" style="color:#7c1f15">${share}</a></p>`
          : ""
      }
      <p style="color:#777;font-size:12px;margin-top:18px">
        All sales are final and non-refundable. Tickets may be transferred to
        someone else who uses your name at check-in.
      </p>
    </div>`;
  try {
    await fetch(EMAIL.sendUrl, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        from: EMAIL.from,
        to,
        subject: `Your booking — ${ev.title}`,
        html,
      }),
    });
  } catch (e) {
    /* don't block the confirmation screen on email errors */
  }
}

  if (!EMAIL.sendUrl || !ev || !hold) return;
  const to = EMAIL.mode === "test" ? EMAIL.testTo : hold.organizerEmail;
  if (!to) return;
  const link = holdLink(hold.token);
  const remaining = hold.partySize - 1; // organizer already paid seat 1
  const row = (k, v) =>
    `<tr><td style="padding:4px 0;color:#555">${k}</td>` +
    `<td style="padding:4px 0;text-align:right"><b>${v}</b></td></tr>`;
  const html = `
    <div style="font-family:Arial,sans-serif;max-width:520px;margin:0 auto;color:#06273a">
      <h2 style="margin:0 0 4px">${ev.title}</h2>
      <p style="margin:0 0 16px;color:#555">${fmtDateLong(ev.date)} · ${fmtTime(ev.time)}</p>
      <p>Hi ${hold.organizerName}, your table for <b>${hold.partySize}</b> is reserved.
      You've paid your own seat — now share the link below so your other
      ${remaining} guest${remaining === 1 ? "" : "s"} can pay their share within
      ${HOLD_HOURS} hours, or the table is released.</p>
      <table style="width:100%;border-top:1px solid #ddd;margin-top:14px">
        ${row("Your seat", money(payInfo && payInfo.subtotal != null ? payInfo.subtotal : hold.seatPrice))}
        ${payInfo && payInfo.tax ? row("Sales tax", money(payInfo.tax)) : ""}
        ${payInfo && payInfo.fee ? row("Processing fee", money(payInfo.fee)) : ""}
        ${row("<b>You paid</b>", "<b>" + money(payInfo ? payInfo.total : hold.seatPrice) + "</b>")}
        ${row("Seats still open", remaining)}
      </table>
      <p style="margin:18px 0 4px"><b>Share this link with your guests</b></p>
      <p style="margin:0 0 4px;color:#555">Each person opens it and pays their own seat:</p>
      <p style="margin:0"><a href="${link}" style="color:#7c1f15">${link}</a></p>
      <p style="color:#777;font-size:12px;margin-top:18px">
        When the last seat is paid the whole table is booked and you'll get the
        final confirmation. All sales are final and non-refundable.
      </p>
    </div>`;
  try {
    await fetch(EMAIL.sendUrl, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        from: EMAIL.from,
        to,
        subject: `Your table is reserved — ${ev.title}`,
        html,
      }),
    });
  } catch (e) {
    /* don't block the reservation on email errors */
  }
}

// The per-ticket guest roster and group code are tucked into the notes field as
// "Guests: ..." and "Group: CODE" lines so they survive without a schema change.
const parseGuestStr = (guestStr) =>
  guestStr
    ? guestStr.split("; ").map((s) => {
        const m = s.match(/^(.*?)(?:\s*\((.*)\))?$/);
        const fullName = (m[1] || "").trim();
        const option = m[2] ? m[2].trim() : "";
        const parts = fullName.split(" ");
        return {
          first: parts[0] || "",
          last: parts.slice(1).join(" "),
          option,
        };
      })
    : [];
const splitNotes = (raw) => {
  let text = raw || "";
  let group = "";
  let guestStr = "";
  text = text.replace(/(^|\n)Group: ([^\n]*)/, (_m, _p, c) => {
    group = c.trim();
    return "";
  });
  text = text.replace(/(^|\n)Guests: ([^\n]*)/, (_m, _p, g) => {
    guestStr = g;
    return "";
  });
  return { notes: text.trim(), guests: parseGuestStr(guestStr), group };
};
// Rebuild the notes field from clean user notes + guest roster + group code.
const buildNotes = (userNotes, guests, group) => {
  const roster = (guests || [])
    .map((g) => {
      const nm = `${g.first} ${g.last}`.trim();
      return g.option ? `${nm} (${g.option})` : nm;
    })
    .filter(Boolean)
    .join("; ");
  return [
    (userNotes || "").trim(),
    roster ? `Guests: ${roster}` : "",
    group ? `Group: ${group}` : "",
  ]
    .filter(Boolean)
    .join("\n");
};
const regFromRow = (r) => {

};
