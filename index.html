// ---------- customer: member sign-in / sign-up ----------
function AuthView({ onDone, onCancel, prefillEmail = "", startTab = "signin" }) {
  const [tab, setTab] = useState(startTab); // signin | signup
  const [first, setFirst] = useState("");
  const [last, setLast] = useState("");
  const [email, setEmail] = useState(prefillEmail);
  const [pw, setPw] = useState("");
  const [err, setErr] = useState("");
  const [notice, setNotice] = useState("");
  const [busy, setBusy] = useState(false);

  const emailOk = /.+@.+\..+/.test(email.trim());
  const switchTab = (t) => {
    setTab(t);
    setErr("");
    setNotice("");
  };

  const signIn = async () => {
    if (!db) return;
    if (!emailOk || !pw) {
      setErr("Enter your email and password.");
      return;
    }
    setBusy(true);
    setErr("");
    const { error } = await db.auth.signInWithPassword({
      email: email.trim(),
      password: pw,
    });
    setBusy(false);
    if (error) {
      setErr(
        /confirm/i.test(error.message)
          ? "Please confirm your email first — check your inbox for the link we sent."
          : "That email and password don't match. Try again."
      );
    } else {
      onDone();
    }
  };

  const signUp = async () => {
    if (!db) return;
    if (!first.trim() || !last.trim()) {
      setErr("Enter your first and last name.");
      return;
    }
    if (!emailOk) {
      setErr("Enter a valid email address.");
      return;
    }
    if (pw.length < 6) {
      setErr("Pick a password of at least 6 characters.");
      return;
    }
    setBusy(true);
    setErr("");
    const { data, error } = await db.auth.signUp({
      email: email.trim(),
      password: pw,
      options: {
        data: {
          first_name: first.trim(),
          last_name: last.trim(),
          full_name: `${first.trim()} ${last.trim()}`,
        },
      },
    });
    setBusy(false);
    if (error) {
      setErr(
        /already registered/i.test(error.message)
          ? "There's already an account with that email — sign in instead."
          : error.message
      );
    } else if (data.session) {
      onDone(); // project has email confirmation off — signed in right away
    } else {
      setNotice(
        `Almost there! We sent a confirmation link to ${email.trim()}. Click it, then come back here and sign in.`
      );
    }
  };

  const submit = () => (tab === "signin" ? signIn() : signUp());

  return (
    <div className="cc-login">
      <h2 className="cc-h2">
        {tab === "signin" ? "Member sign-in" : "Create your account"}
      </h2>
      <p className="cc-lede">
        Keep track of the classes you've attended and find new ones to try.
        You never need an account to buy tickets.
      </p>
      <div className="cc-auth-tabs">
        <button
          className={"cc-tab" + (tab === "signin" ? " on" : "")}
          onClick={() => switchTab("signin")}
        >
          Sign in
        </button>
        <button
          className={"cc-tab" + (tab === "signup" ? " on" : "")}
          onClick={() => switchTab("signup")}
        >
          Create account
        </button>
      </div>
      {tab === "signup" && (
        <div className="cc-auth-names">
          <input
            className="cc-input"
            placeholder="First name"
            value={first}
            onChange={(e) => setFirst(e.target.value)}
          />
          <input
            className="cc-input"
            placeholder="Last name"
            value={last}
            onChange={(e) => setLast(e.target.value)}
          />
        </div>
      )}
      <input
        className="cc-input"
        type="email"
        placeholder="Email"
        value={email}
        onChange={(e) => setEmail(e.target.value)}
        onKeyDown={(e) => e.key === "Enter" && submit()}
      />
      <input
        className="cc-input"
        type="password"
        placeholder={tab === "signup" ? "Password (6+ characters)" : "Password"}
        value={pw}
        onChange={(e) => setPw(e.target.value)}
        onKeyDown={(e) => e.key === "Enter" && submit()}
      />
      {err && <div className="cc-err">{err}</div>}
      {notice && <div className="cc-authnote">{notice}</div>}
      <button
        className="cc-btn cc-btn-wax cc-btn-block"
        disabled={busy}
        onClick={submit}
      >
        {busy
          ? "One moment…"
          : tab === "signin"
          ? "Sign in"
          : "Create account"}
      </button>
      <button className="cc-btn cc-btn-ghost cc-btn-block" onClick={onCancel}>
        Continue as guest
      </button>
    </div>
  );
}

function MemberArea({ user, events, myRegs, soldFor, go, onSignOut }) {
  const today = todayStr();
  const meta = user.user_metadata || {};
  const firstName =
    meta.first_name || (meta.full_name || "").split(" ")[0] || "";
  const evById = {};
  events.forEach((e) => (evById[e.id] = e));

  // My bookings, paired with their event (drop any whose event was deleted).
  const mine = myRegs
    .map((r) => ({ reg: r, ev: evById[r.eventId] }))
    .filter((x) => x.ev);
  const upcoming = mine
    .filter((x) => x.ev.date >= today)
    .sort((a, b) => (a.ev.date + a.ev.time).localeCompare(b.ev.date + b.ev.time));
  const attended = mine
    .filter((x) => x.ev.date < today)
    .sort((a, b) => (b.ev.date + b.ev.time).localeCompare(a.ev.date + a.ev.time));

  // "Try something new": on the schedule, not booked, and not a class they've
  // already taken (matched by title, since the same class repeats on new dates).
  const doneTitles = new Set(
    mine.map((x) => x.ev.title.trim().toLowerCase())

  const bookedIds = new Set(mine.map((x) => x.ev.id));
  const toTry = events
    .filter(
      (e) =>
        e.date >= today &&
        !bookedIds.has(e.id) &&
        !doneTitles.has(e.title.trim().toLowerCase())
    )
    .sort((a, b) => (a.date + a.time).localeCompare(b.date + b.time));

  const Row = ({ ev, right, dim }) => (

        <div className="cc-mem-title">{ev.title}</div>
        <div className="cc-mem-meta">
          {fmtDateLong(ev.date)} · {fmtTime(ev.time)} · 📍{" "}
          {ev.location || "Memphis"}

      </div>
      <div className="cc-mem-right">{right}</div>
    </div>
  );

  return (
    <div className="cc-member">
      <div className="cc-mem-head">
        <div>
          <p className="cc-eyebrow">Member area</p>
          <h1 className="cc-h1">
            {firstName ? `Welcome back, ${firstName}` : "Welcome back"}
          </h1>
          <p className="cc-mem-sub">
            {user.email} · {attended.length}{" "}
            {attended.length === 1 ? "class" : "classes"} attended
          </p>
        </div>
        <button className="cc-btn cc-btn-ghost" onClick={onSignOut}>
          Sign out
        </button>
      </div>

      <section className="cc-mem-section">
        <h2 className="cc-mem-h">Your upcoming classes</h2>
        {upcoming.length === 0 && (
          <p className="cc-mem-empty">
            Nothing booked yet — pick something from the list below or the main
            schedule.
          </p>
        )}
        {upcoming.map((x) => (
          <Row
            key={x.reg.id}
            ev={x.ev}
            right={
              <button
                className="cc-btn cc-btn-ghost"
                onClick={() => go("booking", { regId: x.reg.id })}
              >
                View booking
              </button>
            }
          />
        ))}
      </section>

      <section className="cc-mem-section">
        <h2 className="cc-mem-h">Classes you've attended</h2>
        {attended.length === 0 && (
          <p className="cc-mem-empty">
            No classes yet — your history will build up here after your first

          </p>
        )}
        {attended.map((x) => (
          <Row
            key={x.reg.id}
            ev={x.ev}

// ---------- accounting export ----------
// Reconstruct subtotal / tax / fee from a stored total (total = (subtotal+tax)*1.06).
function breakdown(total) {
  total = total || 0;
  const taxed = Math.round(total / (1 + FEE_RATE)); // subtotal + tax
  const fee = total - taxed;
  const subtotal = Math.round(taxed / (1 + TAX_RATE));
  const tax = taxed - subtotal;
  return { subtotal, tax, fee, total };
}
function downloadCsv(filename, rows) {
  if (typeof document === "undefined") return;
  const esc = (v) => {
    const s = String(v == null ? "" : v);
    return /[",\n]/.test(s) ? `"${s.replace(/"/g, '""')}"` : s;
  };
  const csv = rows.map((r) => r.map(esc).join(",")).join("\r\n");
  const blob = new Blob(["﻿" + csv], { type: "text/csv;charset=utf-8;" });
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url;
  a.download = filename;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
}
function exportBookingsCsv(events, regs) {
  const evById = {};
  events.forEach((e) => (evById[e.id] = e));
  const rows = [
    [
      "Booked At",
      "Class",
      "Class Date",
      "Time",
      "Code",
      "Purchaser",
      "Email",
      "Phone",
      "Tickets",
      "Group",
      "Add-ons",
      "Subtotal",
      "Sales Tax",
      "Processing Fee",
      "Total",
      "Status",
    ],
  ];
  [...regs]
    .sort((a, b) => (a.createdAt || "").localeCompare(b.createdAt || ""))
    .forEach((r) => {
      const ev = evById[r.eventId] || {};
      const b = breakdown(r.total);
      const status = r.refunded ? "Refunded" : r.total === 0 ? "Comp" : "Paid";
      rows.push([
        r.createdAt ? new Date(r.createdAt).toLocaleString() : "",
        ev.title || "",
        ev.date || "",
        ev.time || "",
        r.code || "",
        r.name || "",
        r.email || "",
        r.phone || "",
        r.qty || 0,
        r.group || "",
        (r.addOns || []).map((a) => `${a.qty}x ${a.name}`).join("; "),
        (b.subtotal / 100).toFixed(2),
        (b.tax / 100).toFixed(2),
        (b.fee / 100).toFixed(2),
        (b.total / 100).toFixed(2),
        status,
      ]);
    });
  downloadCsv(
    `greys-bookings-${new Date().toISOString().slice(0, 10)}.csv`,
    rows
  );
}

// Minimal CSV parser (handles quoted fields, commas, and newlines in quotes).
function parseCsv(text) {
  const rows = [];
  let row = [];
  let field = "";
  let inQ = false;
  for (let i = 0; i < text.length; i++) {
    const c = text[i];
    if (inQ) {
      if (c === '"') {
        if (text[i + 1] === '"') {
          field += '"';
          i++;
        } else inQ = false;
      } else field += c;
    } else if (c === '"') inQ = true;
    else if (c === ",") {
      row.push(field);
      field = "";
    } else if (c === "\n") {
      row.push(field);
      rows.push(row);
      row = [];
      field = "";
    } else if (c !== "\r") field += c;
  }
  if (field.length || row.length) {
    row.push(field);
    rows.push(row);
  }
  return rows;
}
// Turn an uploaded classes CSV into event objects (+ any skipped-row notes).
function classesFromCsv(text) {
  const rows = parseCsv(text).filter((r) =>
    r.some((c) => (c || "").trim() !== "")
  );
  if (rows.length < 2) return { events: [], errors: ["No data rows found."] };
  const header = rows[0].map((h) => h.trim().toLowerCase());
  const col = (names) => {
    for (const n of names) {
      const i = header.indexOf(n);
      if (i >= 0) return i;
    }
    return -1;
  };
  const ci = {
    title: col(["title", "class", "name"]),
    date: col(["date"]),
    time: col(["time"]),
    duration: col(["duration", "duration (min)", "minutes"]),
    price: col(["price", "price ($)", "cost"]),
    capacity: col(["capacity", "seats"]),
    blurb: col(["description", "blurb", "details"]),
    addons: col(["add-ons", "addons", "upgrades"]),
    location: col(["location", "city"]),
  };
  // Match a CSV location to one of our locations (case-insensitive); else Memphis.
  const normLoc = (s) =>
    LOCATIONS.find((l) => l.toLowerCase() === (s || "").trim().toLowerCase()) ||
    "Memphis";
  const events = [];
  const errors = [];
  rows.slice(1).forEach((r, n) => {
    const get = (k) => (ci[k] >= 0 ? (r[ci[k]] || "").trim() : "");
    const title = get("title");
    const date = get("date");
    if (!title || !date) {
      errors.push(`Row ${n + 2}: missing title or date — skipped.`);
      return;
    }
    const addOns = get("addons")
      .split(";")
      .map((s) => s.trim())
      .filter(Boolean)
      .map((s) => {
        const [name, p] = s.split(":");
        return {
          id: uid("ao"),
          name: (name || "").trim(),
          price: Math.round(parseFloat((p || "0").trim()) * 100) || 0,
        };
      })
      .filter((a) => a.name);
    events.push({
      id: uid("ev"),
      title,
      blurb: get("blurb"),
      date,
      time: get("time") || "18:00",
      durationMin: Number(get("duration")) || 90,
      price: Math.round(parseFloat(get("price") || "0") * 100),
      capacity: Number(get("capacity")) || 12,
      location: normLoc(get("location")),
      addOns,
    });
  });
  return { events, errors };
}

function AdminDash({ events, regs, soldFor, revenueFor, go, onDelete }) {
  const [classFilter, setClassFilter] = useState("upcoming"); // upcoming|past|all
  const active = regs.filter((r) => !r.refunded);
  const totalSold = active.reduce((s, r) => s + r.qty, 0);
  const netRev = active.reduce((s, r) => s + r.total, 0);
  const refundedAmt = regs
    .filter((r) => r.refunded)
    .reduce((s, r) => s + r.total, 0);
  const feesCollected = active.reduce((s, r) => s + breakdown(r.total).fee, 0);
  const sorted = [...events].sort((a, b) =>
    (a.date + a.time).localeCompare(b.date + b.time)
  );
  const today = todayStr();
  const upcomingClasses = sorted.filter((e) => e.date >= today);
  const pastClasses = sorted.filter((e) => e.date < today);
  const shownClasses =
    classFilter === "past"
      ? [...pastClasses].reverse() // most-recent past first
      : classFilter === "all"
      ? sorted
      : upcomingClasses;
  return (
    <div>
      <div className="cc-dash-head">

          <p className="cc-eyebrow">Dashboard</p>

        <Stat n={money(netRev)} l="Net revenue" />
        <Stat n={totalSold} l="Tickets sold" />

            className="cc-input"

            onChange={(e) => setClassFilter(e.target.value)}

          <span>Class</span>
          <span>Date</span>
          <span>Seats</span>
          <span>Revenue</span>
          <span></span>
        </div>
        {shownClasses.length === 0 && (
          <div className="cc-empty">
            {classFilter === "past"
              ? "No past classes."
              : classFilter === "upcoming"
              ? "No upcoming classes — add one above."
              : "No classes yet."}
          </div>
        )}
        {shownClasses.map((ev) => {
          const sold = soldFor(ev.id);
          const pct = Math.min(100, Math.round((sold / ev.capacity) * 100));
          const past = ev.date < today;
          return (
            <div key={ev.id} className={"cc-tr" + (past ? " cc-tr-past" : "")}>
              <span className="cc-td-title">
                <button className="cc-link" onClick={() => go("detail", { eventId: ev.id })}>
                  {ev.title}

                <span className="cc-td-sub">📍 {ev.location || "Memphis"}</span>
              </span>
              <span className="cc-mono">{fmtDate(ev.date)} · {fmtTime(ev.time)}</span>
              <span>

                <button className="cc-mini" onClick={() => go("edit", { eventId: ev.id })}>
                  Edit
                </button>
                <button
                  className="cc-mini danger"
                  onClick={() => {
                    if (
                      window.confirm(

                      )
                    )
                      onDelete(ev.id);
                  }}
                >
                  Delete
                </button>
              </span>
            </div>
          );
        })}

    </div>
  );

  const inRange = (r) => {
    const d = (r.createdAt || "").slice(0, 10);

    if (to && (!d || d > to)) return false;
    return true;

          <label className="cc-report-field">

          {(from || to) && (

function AdminBulk({ onImport, go }) {
  const handleImport = (e) => {
    const file = e.target.files && e.target.files[0];
    e.target.value = ""; // allow re-selecting the same file later
    if (!file) return;
    const reader = new FileReader();
    reader.onload = () => {
      const { events: evs, errors } = classesFromCsv(String(reader.result));
      if (evs.length === 0) {
        window.alert("No valid classes found.\n" + errors.join("\n"));
        return;
      }
      const msg =
        `Import ${evs.length} class${evs.length > 1 ? "es" : ""}?` +
        (errors.length ? `\n\nSkipped:\n${errors.join("\n")}` : "");
      if (window.confirm(msg)) {
        onImport(evs);
        go("admin");
      }
    };
    reader.readAsText(file);
  };
  return (
    <div>
      <div className="cc-dash-head">
        <div>
          <p className="cc-eyebrow">Back office</p>
          <h2 className="cc-h2">Bulk add classes</h2>

function AdminEdit({ ev, kind, onCancel, onSave }) {
  // Events differ from classes: a table option (party size > 1) and an optional
  // group/table dropdown. Editing an existing record uses its stored kind.
  const editKind = ev ? ev.kind || (ev.partySize > 1 ? "event_tabled" : "class") : null;
  const isClass = ev ? editKind === "class" : kind === "class";
  const isEvent = !isClass;
  const noun = isEvent ? "event" : "class";
  const [title, setTitle] = useState(ev?.title || "");
  const [blurb, setBlurb] = useState(ev?.blurb || "");
  const [dates, setDates] = useState(ev?.date ? [ev.date] : [""]);
  const [time, setTime] = useState(ev?.time || "18:00");
  const [duration, setDuration] = useState(ev?.durationMin || 90);
  const [price, setPrice] = useState(ev ? (ev.price / 100).toString() : "");
  const [capacity, setCapacity] = useState(ev?.capacity || 12);
  const [location, setLocation] = useState(ev?.location || LOCATIONS[0]);
  const [partySize, setPartySize] = useState(ev?.partySize > 1 ? ev.partySize : 4);
  // Events are either "single" tickets or a "tabled" event (class-style tables).
  const [eventType, setEventType] = useState(
    ev ? (editKind === "event_tabled" ? "tabled" : "single") : "tabled"
  );
  const [addOns, setAddOns] = useState(
    ev?.addOns?.map((a) => ({ ...a, priceStr: (a.price / 100).toString() })) ||
      []
  );
  const [err, setErr] = useState("");

  const addRow = () =>
    setAddOns((a) => [...a, { id: uid("ao"), name: "", priceStr: "" }]);
  const rmRow = (id) => setAddOns((a) => a.filter((x) => x.id !== id));
  const editRow = (id, k, v) =>
    setAddOns((a) => a.map((x) => (x.id === id ? { ...x, [k]: v } : x)));

  const setDateAt = (i, v) =>
    setDates((a) => a.map((d, j) => (j === i ? v : d)));
  const addDate = () => setDates((a) => [...a, ""]);
  const rmDate = (i) => setDates((a) => a.filter((_, j) => j !== i));

  const save = () => {
    const validDates = [...new Set(dates.filter(Boolean))];
    if (!title.trim() || validDates.length === 0 || !price) {
      setErr("Title, at least one date, and price are required.");
      return;
    }
    const cleanAddOns = addOns
      .filter((a) => a.name.trim())
      .map((a) => ({
        id: a.id,
        name: a.name.trim(),
        price: Math.round(parseFloat(a.priceStr || "0") * 100),
      }));
    // class → groups; tabled event → tables; single event → no grouping.
    const kindOut = isClass
      ? "class"
      : eventType === "tabled"
      ? "event_tabled"
      : "event_single";
    const tabled = kindOut === "event_tabled";
    const base = {
      title: title.trim(),
      blurb: blurb.trim(),
      time,
      durationMin: Number(duration) || 90,
      price: Math.round(parseFloat(price) * 100),
      capacity: Number(capacity) || 1,
      addOns: cleanAddOns,
      kind: kindOut,
      location,
      partySize: tabled ? Math.max(2, Number(partySize) || 2) : 1,

// Names on the tickets for a booking (falls back to the purchaser if unknown).
const memberNames = (r) =>
  r.guests && r.guests.length
    ? r.guests.map((g) => `${g.first} ${g.last}`.trim()).filter(Boolean)
    : [r.name];
const nameKey = (s) => (s || "").trim().toLowerCase().replace(/\s+/g, " ");

// Build seating groups: first link bookings that share a group code (exact),
// then link any whose "sit with" name matches a guest in another booking.
function buildSeatingGroups(active) {
  const parent = {};
  active.forEach((r) => (parent[r.id] = r.id));
  const find = (x) => (parent[x] === x ? x : (parent[x] = find(parent[x])));
  const union = (a, b) => {
    parent[find(a)] = find(b);
  };
  // 1) union by shared group code
  const byCode = {};
  active.forEach((r) => {
    if (!r.group) return;
    if (byCode[r.group]) union(r.id, byCode[r.group]);
    else byCode[r.group] = r.id;
  });
  // 2) union by "sit with" name → a guest in another booking
  const byName = {};
  active.forEach((r) =>
    memberNames(r).forEach((n) => {
      byName[nameKey(n)] = r.id;
    })
  );
  const unmatched = [];
  active.forEach((r) => {
    if (!r.seatWith) return;
    const targetId = byName[nameKey(r.seatWith)];
    if (targetId && targetId !== r.id) union(r.id, targetId);
    else unmatched.push(r);
  });
  const groupsById = {};
  active.forEach((r) => {
    const root = find(r.id);
    (groupsById[root] = groupsById[root] || []).push(r);
  });
  // A component is a real group if it has 2+ bookings or carries a group code.
  const sitTogether = Object.values(groupsById)
    .filter((g) => g.length >= 2 || g.some((r) => r.group))
    .map((g) => {
      const names = [];
      g.forEach((r) => memberNames(r).forEach((n) => names.push(n)));
      const codeReg = g.find((r) => r.group);
      return { regs: g, names, code: codeReg ? codeReg.group : "", count: g.length };
    });
  const groupedIds = new Set();
  sitTogether.forEach((grp) => grp.regs.forEach((r) => groupedIds.add(r.id)));
  const requests = unmatched
    .filter((r) => !groupedIds.has(r.id))
    .map((r) => ({ members: memberNames(r), wants: r.seatWith }));
  return { sitTogether, requests };
}

// Every booking party (group, linked, or solo) with members + pooled add-ons,
// ready to assign to tables on the printable roster.
function rosterParties(active) {
  const parent = {};
  active.forEach((r) => (parent[r.id] = r.id));
  const find = (x) => (parent[x] === x ? x : (parent[x] = find(parent[x])));
  const union = (a, b) => {
    parent[find(a)] = find(b);
  };
  const byCode = {};
  active.forEach((r) => {
    if (!r.group) return;
    if (byCode[r.group]) union(r.id, byCode[r.group]);
    else byCode[r.group] = r.id;
  });
  const byName = {};
  active.forEach((r) =>
    memberNames(r).forEach((n) => {
      byName[nameKey(n)] = r.id;
    })
  );
  active.forEach((r) => {
    if (!r.seatWith) return;
    const t = byName[nameKey(r.seatWith)];
    if (t && t !== r.id) union(r.id, t);
  });
  const comps = {};
  active.forEach((r) => {
    const root = find(r.id);
    (comps[root] = comps[root] || []).push(r);
  });
  return Object.values(comps)
    .map((regs) => {
      const codeReg = regs.find((r) => r.group);
      // Each member carries their own add-ons (from their ticket selection).
      const members = [];
      regs.forEach((r) => {
        if (r.guests && r.guests.length) {
          r.guests.forEach((g) =>
            members.push({
              name: `${g.first} ${g.last}`.trim(),
              addOns: g.option || "",
            })
          );
        } else {
          members.push({
            name: r.name,
            addOns: (r.addOns || [])
              .map((a) => `${a.qty}× ${a.name}`)
              .join(", "),
          });
        }
      });
      return {
        code: codeReg ? codeReg.group : "",
        members,
        size: members.length,
      };
    })
    .sort((a, b) => (b.code ? 1 : 0) - (a.code ? 1 : 0) || b.size - a.size);
}

// Venue table layout (seats per table) + which tables can be combined.
//   Bar:4 · T1:2 · T2:2 · T3:4 · T4:4 · T5:4 · T9:4 · T10:4
//   Combine groups: 1+2 (→4, +1 extra seat for a 5-top), 3/4/5 (any order),
//   9+10. Parties may span combinable tables and a partly-used table's spare
//   seats can take another small party.
const TABLE_COMBOS = { A: ["1", "2"], B: ["3", "4", "5"], C: ["9", "10"] };
function assignTables(parties) {
  const T = {
    "1": { label: "Table 1", cap: 2, used: 0 },
    "2": { label: "Table 2", cap: 2, used: 0 },
    "3": { label: "Table 3", cap: 4, used: 0 },
    "4": { label: "Table 4", cap: 4, used: 0 },
    "5": { label: "Table 5", cap: 4, used: 0 },
    "9": { label: "Table 9", cap: 4, used: 0 },
    "10": { label: "Table 10", cap: 4, used: 0 },
    bar: { label: "Bar", cap: 4, used: 0 },
  };
  const ids = ["1", "2", "3", "4", "5", "9", "10", "bar"];
  const free = (id) => T[id].cap - T[id].used;
  // Best single table that fits: least leftover, prefer already-used tables
  // (consolidate into spare seats), then smaller tables.
  const bestSingle = (s) => {
    let best = null;
    let bestScore = Infinity;
    for (const id of ids) {
      if (T[id].blocked || free(id) < s) continue;
      const score = (free(id) - s) * 10 + (T[id].used > 0 ? 0 : 3) + T[id].cap * 0.1;
      if (score < bestScore) {
        bestScore = score;
        best = id;
      }
    }
    return best;
  };
  // Spread a party across the tables of one combine group.
  const spanCombo = (s) => {
    for (const c of ["B", "C", "A"]) {
      const tids = TABLE_COMBOS[c];
      if (tids.reduce((sum, id) => sum + free(id), 0) < s) continue;
      let rem = s;
      const used = [];
      for (const id of tids) {
        const take = Math.min(free(id), rem);
        if (take <= 0) continue;
        T[id].used += take;
        rem -= take;
        used.push(id);
        if (rem <= 0) break;
      }
      if (rem <= 0) return "Tables " + used.join("+");
    }
    return null;
  };

  const result = parties.map(() => "");
  const order = parties.map((p, i) => i);
  const singles = order.filter((i) => parties[i].size === 1);
  const groups = order
    .filter((i) => parties[i].size >= 2)
    .sort((a, b) => parties[b].size - parties[a].size);

  // 1) singles → bar first
  let si = 0;
  for (; si < singles.length && free("bar") > 0; si++) {
    T.bar.used++;
    result[singles[si]] = "Bar";
  }
  const leftoverSingles = singles.slice(si);

  // 2) groups, largest first
  for (const i of groups) {
    const s = parties[i].size;
    let label = null;
    if (s <= 4) {
      const t = bestSingle(s);
      if (t) {
        T[t].used += s;
        label = T[t].label;
      }
    }
    // a 5-top uses the combined 1+2 with its extra 5th seat
    if (!label && s === 5 && T["1"].used === 0 && T["2"].used === 0) {
      T["1"].used = 2;
      T["2"].used = 2;
      T["1"].blocked = true;
      T["2"].blocked = true;
      label = "Tables 1+2";
    }
    if (!label) label = spanCombo(s);
    result[i] = label || "Unassigned";
  }

  // 3) leftover singles → fill spare seats, then anywhere
  for (const i of leftoverSingles) {
    const t = bestSingle(1);
    if (t) {
      T[t].used += 1;
      result[i] = T[t].label;
    } else {
      result[i] = "Unassigned";
    }
  }
  return result;
}

// Printable seating roster — groups/parties with their add-ons + a Table line.
function SeatingRoster({ parties }) {
  const tables = assignTables(parties);
  return (
    <>
      {parties.length === 0 ? (
        <div className="cc-empty">No bookings yet for this class.</div>
      ) : (
        parties.map((p, i) => (
          <div key={i} className="cc-rparty">
            <div className="cc-rparty-top">
              <span className="cc-rparty-name">
                {p.code
                  ? `Group ${p.code}`
                  : p.size > 1
                  ? `Party ${i + 1}`
                  : (p.members[0] && p.members[0].name) || "Guest"}
              </span>
              <span
                className={
                  "cc-rparty-table" +
                  (tables[i] === "Unassigned" ? " unassigned" : "")
                }
              >
                {tables[i]}
              </span>
            </div>
            <div className="cc-rparty-seats">
              {p.size} {p.size === 1 ? "seat" : "seats"}
            </div>
            {p.members.map((m, j) => (
              <div key={j} className="cc-rmember">
                <span className="cc-rmember-name">{m.name}</span>
                {m.addOns ? (
                  <span className="cc-rmember-adds">+ {m.addOns}</span>
                ) : null}
              </div>
            ))}
          </div>
        ))
      )}
    </>
  );
}

// ---------- manager: edit a sold booking ----------
function RegEditor({ reg, ev, onCancel, onSave }) {
  const seed =
    reg.guests && reg.guests.length
      ? reg.guests
      : [
          {
            first: (reg.name || "").split(" ")[0] || reg.name,
            last: (reg.name || "").split(" ").slice(1).join(" "),
            option: "",
          },
        ];
  const [guests, setGuests] = useState(
    seed.map((g) => ({ first: g.first, last: g.last, option: g.option || "" }))
  );
  const [group, setGroup] = useState(reg.group || "");
  const setG = (i, patch) =>
    setGuests((p) => p.map((g, j) => (j === i ? { ...g, ...patch } : g)));
  const addPerson = () =>
    setGuests((p) => [...p, { first: "", last: "", option: "" }]);
  const rmPerson = (i) => setGuests((p) => p.filter((_, j) => j !== i));
  const save = () => {
    const clean = guests
      .filter((g) => g.first.trim() || g.last.trim())
      .map((g) => ({
        first: g.first.trim(),
        last: g.last.trim(),
        option: g.option,
      }));
    const qty = clean.length || 1;
    const addonTotal = reg.total - reg.qty * ev.price; // keep upgrade charges
    onSave({
      guests: clean,
      qty,
      total: ev.price * qty + addonTotal,
      group: group.trim(),
    });
  };
  return (
    <div className="cc-regedit cc-no-print">
      <div className="cc-regedit-head">Edit booking · {reg.code}</div>
      {guests.map((g, i) => (
        <div key={i} className="cc-regedit-row">
          <input
            className="cc-input"
            placeholder="First name"
            value={g.first}
            onChange={(e) => setG(i, { first: e.target.value })}
          />
          <input
            className="cc-input"
            placeholder="Last name"
            value={g.last}
            onChange={(e) => setG(i, { last: e.target.value })}
          />
          {g.option ? <span className="cc-chip">{g.option}</span> : null}
          {guests.length > 1 && (
            <button className="cc-mini danger" onClick={() => rmPerson(i)}>
              ✕
            </button>
          )}
        </div>
      ))}
      <button className="cc-mini" onClick={addPerson}>
        + Add person
      </button>
      <div className="cc-regedit-grid">
        <div>
          <label className="cc-label">Group</label>
          <select
            className="cc-input"
            value={group}
            onChange={(e) => setGroup(e.target.value)}
          >
            <option value="">No group</option>
            {GROUP_NAMES.map((n) => (
              <option key={n} value={n}>
                {n}
              </option>
            ))}
          </select>
        </div>
      </div>
      <p className="cc-hint">
        Names must match exactly for seating to link guests. Adding a person
        adds a seat at {money(ev.price)}.
      </p>
      <div className="cc-edit-actions">
        <button className="cc-btn cc-btn-ghost" onClick={onCancel}>
          Cancel
        </button>
        <button className="cc-btn cc-btn-wax" onClick={save}>
          Save changes
        </button>
      </div>
    </div>
  );
}

// ---------- manager: add a comp (no-payment) guest ----------
function CompAdd({ ev, onCancel, onSave }) {
  const [guests, setGuests] = useState([
    { first: "", last: "", group: "", opts: [] },
  ]);
  const [err, setErr] = useState("");
  const addOnById = (id) => ev.addOns.find((x) => x.id === id);
  const setG = (i, patch) =>
    setGuests((p) => p.map((g, j) => (j === i ? { ...g, ...patch } : g)));
  const addPerson = () =>
    setGuests((p) => [...p, { first: "", last: "", group: "", opts: [] }]);
  const rmPerson = (i) => setGuests((p) => p.filter((_, j) => j !== i));
  const toggleOpt = (i, id) =>
    setGuests((p) =>
      p.map((g, j) =>
        j === i
          ? {
              ...g,
              opts: g.opts.includes(id)
                ? g.opts.filter((x) => x !== id)
                : [...g.opts, id],
            }
          : g
      )
    );
  const save = () => {
    const named = guests.filter((g) => g.first.trim() || g.last.trim());
    if (named.length === 0) {
      setErr("Add at least one guest name.");
      return;
    }
    // One $0 booking per comp guest (each can have their own group + add-ons).
    const regs = named.map((g) => {
      const optNames = g.opts
        .map((id) => addOnById(id)?.name)
        .filter(Boolean);
      const guestObj = {
        first: g.first.trim(),
        last: g.last.trim(),
        option: optNames.join(", "),
      };
      const addOns = g.opts
        .map((id) => {
          const a = addOnById(id);
          return a ? { name: a.name, qty: 1, price: a.price } : null;
        })
        .filter(Boolean);
      return {
        id: uid("reg"),
        code: code(),
        eventId: ev.id,
        name: `${g.first} ${g.last}`.trim() || "Comp guest",
        email: "",
        phone: "",
        qty: 1,
        addOns,
        seatWith: "",
        group: g.group,
        notes: buildNotes("Comp (no payment)", [guestObj], g.group),
        total: 0,
        createdAt: new Date().toISOString(),
      };
    });
    onSave(regs);
  };
  return (
    <div className="cc-regedit cc-no-print">
      <div className="cc-regedit-head">Add comp guests · no payment</div>
      {guests.map((g, i) => (
        <div key={i} className="cc-comp-guest">
          <div className="cc-comp-row">
            <input
              className="cc-input"
              placeholder="First name"
              value={g.first}
              onChange={(e) => setG(i, { first: e.target.value })}
            />
            <input
              className="cc-input"
              placeholder="Last name"
              value={g.last}
              onChange={(e) => setG(i, { last: e.target.value })}
            />
            <select
              className="cc-input"
              value={g.group}
              onChange={(e) => setG(i, { group: e.target.value })}
            >
              <option value="">No group</option>
              {GROUP_NAMES.map((n) => (
                <option key={n} value={n}>
                  {n}
                </option>
              ))}
            </select>
            {guests.length > 1 && (
              <button className="cc-mini danger" onClick={() => rmPerson(i)}>
                ✕
              </button>
            )}
          </div>
          {ev.addOns.length > 0 && (
            <div className="cc-opts cc-comp-opts">
              {ev.addOns.map((a) => (
                <label key={a.id} className="cc-check">
                  <input
                    type="checkbox"
                    checked={g.opts.includes(a.id)}
                    onChange={() => toggleOpt(i, a.id)}
                  />
                  <span>{a.name}</span>
                </label>
              ))}
            </div>
          )}
        </div>
      ))}
      <button className="cc-mini" onClick={addPerson}>
        + Add person
      </button>
      <p className="cc-hint">
        Comps are added at $0 — no payment is taken. Each guest can be in their
        own group with their own add-ons; they count toward seats and appear on
        the roster.
      </p>
      {err && <div className="cc-err">{err}</div>}
      <div className="cc-edit-actions">
        <button className="cc-btn cc-btn-ghost" onClick={onCancel}>
          Cancel
        </button>
        <button className="cc-btn cc-btn-wax" onClick={save}>
          Add comp guests
        </button>
      </div>
    </div>
  );
}

// Open a printable, full-detail receipt for one booking in a new window.
function printBookingDoc(reg, ev) {
  if (!reg || !ev || typeof window === "undefined") return;
  const b = breakdown(reg.total);
  const esc = (s) =>
    String(s == null ? "" : s).replace(/[<>&]/g, (c) =>
      c === "<" ? "&lt;" : c === ">" ? "&gt;" : "&amp;"
    );
  const list =
    reg.guests && reg.guests.length
      ? reg.guests
      : [{ first: reg.name, last: "", option: "" }];
  const guestRows = list
    .map((g) => {
      const opts = (g.option || "")
        .split(",")
        .map((s) => s.trim())
        .filter(Boolean);
      const extra = opts.reduce((s, o) => {
        const a = (ev.addOns || []).find((x) => x.name === o);
        return s + (a ? a.price : 0);
      }, 0);
      const amt = reg.total === 0 ? 0 : ev.price + extra;
      const nm = `${g.first || ""} ${g.last || ""}`.trim() || "Ticket";
      const opt = opts.length
        ? ` <span style="color:#7c1f15">· ${esc(opts.join(", "))}</span>`
        : "";
      return `<tr><td>${esc(nm)}${opt}</td><td style="text-align:right">${money(
        amt
      )}</td></tr>`;
    })
    .join("");
  const tag = reg.refunded
    ? " · REFUNDED"
    : reg.total === 0
    ? " · COMP"
    : "";
  const html = `<!doctype html><html><head><meta charset="utf-8"><title>Booking ${esc(
    reg.code
  )}</title><style>
    body{font-family:Arial,Helvetica,sans-serif;max-width:540px;margin:26px auto;color:#06273a;padding:0 18px;}
    h1{font-size:22px;margin:0 0 3px;} .sub{color:#555;margin:0 0 3px;font-size:14px;}
    .code{font-family:'Courier New',monospace;font-size:15px;font-weight:bold;}
    hr{border:none;border-top:1px solid #ccc;margin:14px 0;}
    .meta{font-size:13.5px;line-height:1.7;color:#222;}
    table{width:100%;border-collapse:collapse;font-size:14px;margin-top:12px;}
    td{padding:5px 0;} .s td{color:#555;font-size:13px;padding:2px 0;}
    .s.first td{border-top:1px solid #ddd;padding-top:8px;margin-top:6px;}
    .tot td{border-top:2px solid #06273a;font-weight:bold;font-size:16px;padding-top:9px;}
    @media print{body{margin:0;}}
  </style></head><body>
    <h1>${esc(ev.title)}</h1>
    <p class="sub">${fmtDateLong(ev.date)} · ${fmtTime(ev.time)} · ${ev.durationMin} min</p>
    <p class="sub"><b>📍 GREYS ${esc(ev.location || "Memphis")}</b></p>
    <p class="sub">Confirmation <span class="code">${esc(reg.code)}</span>${tag}</p>
    <hr/>
    <p class="meta">
      <b>Purchaser:</b> ${esc(reg.name)}<br/>
      ${reg.email ? `<b>Email:</b> ${esc(reg.email)}<br/>` : ""}
      ${reg.phone ? `<b>Phone:</b> ${esc(reg.phone)}<br/>` : ""}
      ${
        reg.group
          ? `<b>${ev.kind === "event_tabled" ? "Table" : "Group"}:</b> ${esc(
              reg.group
            )}<br/>`
          : ""
      }
      <b>Tickets:</b> ${reg.qty}
    </p>
    <table>
      ${guestRows}
      <tr class="s first"><td>Subtotal</td><td style="text-align:right">${money(
        b.subtotal
      )}</td></tr>
      <tr class="s"><td>Sales tax</td><td style="text-align:right">${money(
        b.tax
      )}</td></tr>
      <tr class="s"><td>Processing fee</td><td style="text-align:right">${money(
        b.fee
      )}</td></tr>
      <tr class="tot"><td>Total</td><td style="text-align:right">${money(
        reg.total
      )}</td></tr>
    </table>
    ${reg.notes ? `<p class="meta"><b>Notes:</b> ${esc(reg.notes)}</p>` : ""}
  </body></html>`;
  const w = window.open("", "_blank", "width=620,height=760");
  if (!w) {
    window.alert("Allow pop-ups for this site to print a booking.");
    return;
  }
  w.document.open();
  w.document.write(html);
  w.document.close();
  w.focus();
  setTimeout(() => {
    try {
      w.print();
    } catch (e) {}
  }, 300);
}

// ---------- manager: bookings + seating ----------
function AdminDetail({ ev, regs, soldFor, go, onRefund, onUpdate, onAddComp }) {
  const [editId, setEditId] = useState(null);
  // Roster starts collapsed — open it with the drop button when needed.
  const [rosterOpen, setRosterOpen] = useState(false);
  const [showComp, setShowComp] = useState(false);
  const [regFilter, setRegFilter] = useState("paid"); // paid | refunded | all
  if (!ev) return null;
  const sold = soldFor(ev.id);
  const active = regs.filter((r) => !r.refunded);
  const refundedList = regs.filter((r) => r.refunded);
  const rev = active.reduce((s, r) => s + r.total, 0);
  const refundedAmt = refundedList.reduce((s, r) => s + r.total, 0);
  const withSeat = active.filter((r) => r.seatWith || r.group);
  const seating = buildSeatingGroups(active);
  const hasSeating =
    seating.sitTogether.length > 0 || seating.requests.length > 0;
  const full = sold >= ev.capacity;
  const parties = rosterParties(active);
  const shownRegs = regs
    .filter((r) =>
      regFilter === "all" ? true : regFilter === "refunded" ? r.refunded : !r.refunded
    )
    .sort((a, b) => (a.refunded ? 1 : 0) - (b.refunded ? 1 : 0));
  const printRoster = () => {
    if (typeof window !== "undefined") window.print();
  };
  return (
    <div>
      <button className="cc-back cc-no-print" onClick={() => go("admin")}>
        ← All classes
      </button>
      <div className="cc-dash-head">
        <div>
          <p className="cc-eyebrow">
            {fmtDateLong(ev.date)} · {fmtTime(ev.time)} · 📍 {ev.location || "Memphis"}
          </p>
          <h2 className="cc-h2">{ev.title}</h2>
        </div>
        <div className="cc-detail-actions cc-no-print">
          <button
            className="cc-btn cc-btn-ghost"
            onClick={() => setShowComp((s) => !s)}
          >
            {showComp ? "Cancel comp" : "+ Add comp guest"}
          </button>
          <button className="cc-btn cc-btn-ghost" onClick={printRoster}>
            Print roster
          </button>
          <button className="cc-btn cc-btn-ghost" onClick={() => go("edit", { eventId: ev.id })}>
            Edit class
          </button>
        </div>
      </div>

      {showComp && (
        <CompAdd
          ev={ev}
          onCancel={() => setShowComp(false)}
          onSave={(regsArr) => {
            onAddComp(regsArr);
            setShowComp(false);
          }}
        />
      )}

      <div className="cc-stats cc-no-print">
        <Stat n={`${sold}/${ev.capacity}`} l="Seats filled" />
        <Stat n={active.length} l="Bookings" />
        <Stat n={money(rev)} l="Net revenue" />
        <Stat n={withSeat.length} l="Seating requests" />
      </div>

      {refundedList.length > 0 && (
        <div className="cc-refundnote cc-no-print">
          {refundedList.length} refunded · {money(refundedAmt)} returned · seats released
        </div>
      )}

      <div className="cc-rosterview cc-no-print">
        <div className="cc-rosterview-head">
          <button
            className="cc-roster-drop"
            onClick={() => setRosterOpen((s) => !s)}
            aria-expanded={rosterOpen}
          >
            <span className="cc-caret">{rosterOpen ? "▾" : "▸"}</span>
            <span>Seating roster</span>
            {full && <span className="cc-chip seat">Class full</span>}
          </button>
          {rosterOpen && (
            <button className="cc-btn cc-btn-wax" onClick={printRoster}>
              Print
            </button>
          )}
        </div>
        {rosterOpen && (
          <>
            <p className="cc-hint" style={{ margin: "0 0 12px" }}>
              Each party below can be assigned to a table — groups stay together.
            </p>
            <SeatingRoster parties={parties} />
          </>
        )}
      </div>

      {hasSeating && (
        <div className="cc-seatpanel cc-no-print">
          <h4>Seating requests</h4>
          {seating.sitTogether.map((grp, i) => (
            <div key={"g" + i} className="cc-seatgroup">
              <span className="cc-seatgroup-tag">
                {grp.code ? `Group ${grp.code}` : "Seat together"}
              </span>
              <span className="cc-seatnames">{grp.names.join(", ")}</span>
              {grp.code && grp.count < 2 && (
                <span className="cc-td-sub">(awaiting more guests)</span>
              )}
            </div>
          ))}
          {seating.requests.map((req, i) => (
            <div key={"r" + i} className="cc-seatline">
              <b>{req.members.join(", ")}</b>
              <span className="cc-arrow">
                {req.members.length > 1 ? "want" : "wants"} to sit with
              </span>
              <span className="cc-seatwith">{req.wants}</span>
            </div>
          ))}
        </div>
      )}

      <div className="cc-reg-head cc-no-print">
        <h4>Bookings</h4>
        <div className="cc-reg-filter">
          <span>Show</span>
          <select
            className="cc-input"
            value={regFilter}
            onChange={(e) => setRegFilter(e.target.value)}
          >
            <option value="paid">Paid ({active.length})</option>
            <option value="refunded">Refunded ({refundedList.length})</option>
            <option value="all">All ({regs.length})</option>
          </select>
        </div>
      </div>

      <div className="cc-regcards cc-no-print">
        {shownRegs.length === 0 && (
          <div className="cc-empty">
            {regFilter === "refunded"
              ? "No refunded bookings."
              : "No bookings yet for this class."}
          </div>
        )}
        {shownRegs.map((r) => (
          <div
            key={r.id}
            className={"cc-regcard" + (r.refunded ? " refunded" : "")}
          >
            <div className="cc-regcard-top">
              <div className="cc-regcard-who">
                <span className="cc-regcard-name">
                  {r.name}
                  {r.refunded && (
                    <span className="cc-badge-refund">Refunded</span>
                  )}
                  {!r.refunded && r.total === 0 && (
                    <span className="cc-badge-comp">Comp</span>
                  )}
                </span>
                <span className="cc-td-sub">{r.email || "—"}</span>
                <span className="cc-td-sub">
                  {r.phone || "no phone"} · <span className="cc-mono">{r.code}</span>
                </span>
              </div>
              <div className="cc-regcard-paid">
                <span className="cc-mono">{money(r.total)}</span>
                <span className="cc-td-sub">
                  {r.qty} {r.qty === 1 ? "ticket" : "tickets"}
                </span>
              </div>
            </div>

            {r.guests && r.guests.length > 0 ? (
              <div className="cc-rcpt">
                {r.guests.map((g, i) => {
                  const opts = (g.option || "")
                    .split(",")
                    .map((s) => s.trim())
                    .filter(Boolean);
                  const extra = opts.reduce((s, o) => {
                    const a = (ev.addOns || []).find((x) => x.name === o);
                    return s + (a ? a.price : 0);
                  }, 0);
                  const lineAmt = r.total === 0 ? 0 : ev.price + extra;
                  return (
                    <div key={i} className="cc-rcpt-row">
                      <span className="cc-rcpt-name">
                        {`${g.first} ${g.last}`.trim() || `Ticket ${i + 1}`}
                        {opts.length > 0 && <em> · {opts.join(", ")}</em>}
                      </span>
                      <span className="cc-rcpt-amt">{money(lineAmt)}</span>
                    </div>
                  );
                })}
                {(() => {
                  const b = breakdown(r.total);
                  return (
                    <>
                      <div className="cc-rcpt-row sub">
                        <span>Subtotal</span>
                        <span>{money(b.subtotal)}</span>
                      </div>
                      <div className="cc-rcpt-row sub">
                        <span>Sales tax</span>
                        <span>{money(b.tax)}</span>
                      </div>
                      <div className="cc-rcpt-row sub">
                        <span>Processing fee</span>
                        <span>{money(b.fee)}</span>
                      </div>
                      <div className="cc-rcpt-row total">
                        <span>Total</span>
                        <span>{money(r.total)}</span>
                      </div>
                    </>
                  );
                })()}
              </div>
            ) : null}

            <div className="cc-regcard-meta">
              {r.group && <span className="cc-chip seat">Group {r.group}</span>}
              {(!r.guests || r.guests.length === 0) &&
                r.addOns.map((a, i) => (
                  <span key={i} className="cc-chip">
                    {a.qty}× {a.name}
                  </span>
                ))}
              {r.seatWith && <span className="cc-chip seat">{r.seatWith}</span>}
            </div>
            {r.notes && <div className="cc-td-sub">{r.notes}</div>}

            <div className="cc-regcard-actions">
              <button className="cc-mini" onClick={() => printBookingDoc(r, ev)}>
                🖨 Print
              </button>
              <button
                className="cc-mini"
                onClick={() => setEditId(editId === r.id ? null : r.id)}
              >
                {editId === r.id ? "Close" : "Edit"}
              </button>
              {!r.refunded && (
                <button
                  className="cc-mini danger"
                  onClick={() => {
                    if (
                      window.confirm(
                        `Refund ${r.name}'s ${money(r.total)} payment? This frees ${r.qty} seat(s). At launch this issues a real refund to their card.`
                      )
                    )
                      onRefund(r.id);
                  }}
                >
                  Refund
                </button>
              )}
            </div>
            {editId === r.id && (
              <RegEditor
                reg={r}
                ev={ev}
                onCancel={() => setEditId(null)}
                onSave={(patch) => {
                  onUpdate(r.id, patch);
                  setEditId(null);
                }}
              />
            )}
          </div>
        ))}
      </div>

      {/* Print-only roster — hidden on screen, shown when the manager prints */}
      <div className="cc-print-roster">
        <SeatingRoster parties={parties} />
      </div>
    </div>
  );
}

// ---------- small shared pieces ----------
function GroupShare({ link }) {
  const [copied, setCopied] = useState(false);
  const copy = () => {
    if (typeof navigator !== "undefined" && navigator.clipboard) {
      navigator.clipboard.writeText(link).then(
        () => {
          setCopied(true);
          setTimeout(() => setCopied(false), 1800);
        },
        () => {}
      );
    }
  };
  return (
    <div className="cc-share">
      <input className="cc-input cc-share-input" readOnly value={link} />
      <button className="cc-btn cc-btn-wax cc-share-btn" onClick={copy}>
        {copied ? "Copied!" : "Copy link"}
      </button>
    </div>
  );
}
function Section({ label, children }) {
  return (
    <section className="cc-section">
      <h3 className="cc-section-label">{label}</h3>
      {children}
    </section>
  );
}
function Stepper({ value, min, max, onChange }) {
  return (
    <div className="cc-stepper">
      <button
        onClick={() => onChange(Math.max(min, value - 1))}
        disabled={value <= min}
      >
        −
      </button>
      <span className="cc-mono">{value}</span>
      <button
        onClick={() => onChange(Math.min(max, value + 1))}
        disabled={value >= max}
      >
        +
      </button>
    </div>
  );
}
function Line({ k, v }) {
  return (
    <div className="cc-line">
      <span>{k}</span>
      <span className="cc-mono">{v}</span>
    </div>
  );
}
function Stat({ n, l }) {
  return (
    <div className="cc-stat">
      <div className="cc-stat-n">{n}</div>
      <div className="cc-stat-l">{l}</div>
    </div>
  );
}

.cc-stub{position:relative;flex:0 0 86px;background:${C.rind};color:${C.paper};
  display:flex;flex-direction:column;align-items:center;justify-content:center;padding:18px 8px;gap:2px;}
.cc-stub-mon{font-family:'Jost',sans-serif;font-size:12px;letter-spacing:.18em;color:${C.cheddar};}
.cc-stub-day{font-family:'Playfair Display',serif;font-weight:900;font-size:40px;line-height:.9;}
.cc-stub-time{font-family:'Jost',sans-serif;font-size:11px;color:#C9BCA6;margin-top:4px;}
.cc-punch{position:absolute;top:13px;width:11px;height:11px;border-radius:50%;
  background:${C.paper};box-shadow:inset 0 0 0 2px ${C.rind};}
.cc-perf{display:none;}
.cc-ticket-body{flex:1;padding:20px 22px;display:flex;flex-direction:column;}
.cc-ticket-title{font-family:'Playfair Display',serif;font-weight:800;font-size:21px;line-height:1.05;
  margin:0 0 8px;color:${C.rind};}
.cc-ticket-blurb{font-size:13.5px;line-height:1.5;color:${C.sub};margin:0 0 14px;flex:1;}
.cc-ticket-meta{display:flex;align-items:center;gap:8px;font-size:13px;color:${C.sub};margin-bottom:14px;}
.cc-price{font-family:'Jost',sans-serif;font-weight:700;font-size:16px;color:${C.rind};}
.cc-dot{color:${C.line};}
.cc-ticket-foot{display:flex;align-items:center;justify-content:space-between;gap:10px;}
.cc-seats{font-family:'Jost',sans-serif;font-size:11.5px;letter-spacing:.03em;color:${C.sage};}
.cc-seats.low{color:${C.wax};}
.cc-seats.out{color:${C.sub};}

/* buttons */
.cc-btn{font-family:'Playfair Display',serif;font-weight:700;font-size:14px;border:2px solid ${C.rind};
  border-radius:0;padding:10px 20px;cursor:pointer;transition:transform .1s;}
.cc-btn:active{transform:translateY(1px);}
.cc-btn-wax{background:${C.wax};color:#fff;}
.cc-btn-wax:disabled{background:${C.line};border-color:${C.line};color:#fff;cursor:not-allowed;}
.cc-btn-ghost{background:transparent;color:${C.rind};}
.cc-btn-block{display:block;width:100%;margin-top:14px;}

/* booking */
.cc-back{background:none;border:none;cursor:pointer;font-family:'Jost',sans-serif;
  font-size:12px;color:${C.sub};letter-spacing:.04em;margin-bottom:18px;}
.cc-back:hover{color:${C.wax};}
.cc-book-grid{display:grid;grid-template-columns:1fr 320px;gap:34px;align-items:start;}
.cc-section{border-top:1px solid ${C.line};padding:22px 0;}
.cc-section-label{font-family:'Jost',sans-serif;font-size:12px;letter-spacing:.14em;
  text-transform:uppercase;color:${C.wax};margin:0 0 16px;}
.cc-stepper-row{display:flex;align-items:center;justify-content:space-between;gap:16px;
  padding:8px 0;}
.cc-field-name{font-weight:600;font-size:15px;}
.cc-field-sub{font-size:13px;color:${C.sub};margin-top:2px;}
.cc-stepper{display:flex;align-items:center;gap:14px;border:2px solid ${C.rind};border-radius:0;
  padding:4px 6px;}
.cc-stepper button{width:30px;height:30px;border:none;background:${C.rind};color:${C.paper};
  border-radius:50%;font-size:18px;cursor:pointer;line-height:1;}
.cc-stepper button:disabled{background:${C.line};cursor:not-allowed;}
.cc-stepper .cc-mono{min-width:20px;text-align:center;font-size:15px;}
.cc-hint{font-size:12px;color:${C.sub};margin:10px 0 0;line-height:1.5;}
.cc-hint.center{text-align:center;}
.cc-label{display:block;font-size:13px;font-weight:600;color:${C.rind};margin:14px 0 6px;}
.cc-input{width:100%;border:2px solid ${C.line};border-radius:0;padding:11px 13px;font-size:14px;
  font-family:inherit;background:#fff;color:${C.ink};}
.cc-input:focus{outline:none;border-color:${C.rind};}
.cc-textarea{min-height:78px;resize:vertical;}
.cc-input-sm{width:110px;}
.cc-row2{display:grid;grid-template-columns:1fr 1fr;gap:14px;}
.cc-row3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px;}
.cc-guest{border:1.5px solid ${C.line};border-radius:0;padding:12px 16px 16px;
  margin-bottom:14px;background:#FCFAF3;}
.cc-guest-head{font-family:'Jost',sans-serif;font-size:11px;letter-spacing:.12em;
  text-transform:uppercase;color:${C.wax};margin-bottom:2px;}
select.cc-input{appearance:auto;-webkit-appearance:auto;cursor:pointer;}
.cc-opts{display:flex;flex-direction:column;gap:8px;margin-top:4px;}
.cc-check{display:flex;align-items:center;gap:9px;font-size:14px;color:${C.ink};
  cursor:pointer;padding:7px 11px;border:1.5px solid ${C.line};border-radius:0;background:#fff;}
.cc-check input{width:17px;height:17px;accent-color:${C.wax};cursor:pointer;}
.cc-date-row{display:flex;gap:8px;align-items:center;margin-bottom:8px;}
.cc-date-row .cc-input{flex:1;}
.cc-dash-actions{display:flex;gap:10px;flex-wrap:wrap;}
.cc-seatgroup{display:flex;align-items:center;gap:10px;flex-wrap:wrap;padding:7px 0;}
.cc-seatgroup-tag{font-family:'Jost',sans-serif;font-size:10.5px;letter-spacing:.08em;
  text-transform:uppercase;background:${C.sage};color:#fff;border-radius:0;padding:3px 8px;}
.cc-seatnames{font-weight:600;color:${C.ink};}
.cc-td-guests{display:flex;flex-wrap:wrap;gap:5px;margin-top:6px;}
.cc-guestname{font-size:11.5px;background:#EFE7D3;border:1px solid ${C.line};
  border-radius:0;padding:2px 7px;color:${C.ink};}
.cc-guestname em{font-style:normal;color:${C.sub};}
.cc-rt-guests{font-size:11px;color:#333;margin-top:2px;}
/* order-page policy block */
.cc-policy{margin-top:30px;border-top:2px solid ${C.rind};padding-top:22px;}
.cc-policy h3{font-family:'Playfair Display',serif;font-weight:800;font-size:18px;color:${C.rind};
  margin:18px 0 8px;}
.cc-policy h4{font-family:'Playfair Display',serif;font-weight:700;font-size:14.5px;color:${C.rind};
  margin:16px 0 4px;}
.cc-policy p{font-size:13.5px;line-height:1.6;color:${C.sub};margin:0 0 8px;max-width:70ch;}
.cc-policy .cc-policy-lead{font-weight:600;color:${C.ink};}
.cc-policy a{color:${C.wax};}
.cc-demo-pay{background:#F6EAD0;border:1px dashed ${C.cheddarDk};border-radius:0;padding:9px 12px;
  font-size:12.5px;color:${C.cheddarDk};margin-bottom:6px;}
.cc-err{background:#F7E2DE;border:1px solid ${C.wax};color:${C.waxDark};border-radius:0;
  padding:10px 14px;font-size:13.5px;margin-top:14px;}

/* summary */
.cc-summary{position:sticky;top:20px;}
.cc-summary-card{background:${C.card};border:2px solid ${C.rind};border-radius:0;padding:20px;
  box-shadow:5px 5px 0 ${C.rind};}
.cc-summary-card h4{font-family:'Playfair Display',serif;font-weight:800;font-size:16px;margin:0 0 14px;}
.cc-line{display:flex;justify-content:space-between;gap:12px;font-size:13.5px;color:${C.sub};
  padding:6px 0;}
.cc-total{display:flex;justify-content:space-between;border-top:2px solid ${C.rind};margin-top:10px;
  padding-top:12px;font-family:'Playfair Display',serif;font-weight:800;font-size:18px;color:${C.rind};}
.cc-mono{font-family:'Jost',sans-serif;}

/* confirmation */
.cc-confirm{max-width:480px;margin:10px auto;text-align:center;}
.cc-confirm-ticket{background:${C.card};border:2px solid ${C.rind};border-radius:0;padding:28px;
  box-shadow:7px 7px 0 ${C.rind};text-align:left;}
.cc-confirm-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;}
.cc-confirm-tag{background:${C.sage};color:#fff;font-family:'Jost',sans-serif;font-size:11px;
  letter-spacing:.12em;text-transform:uppercase;padding:5px 11px;border-radius:0;}
.cc-confirm-code{font-family:'Jost',sans-serif;font-weight:700;font-size:15px;color:${C.wax};}
.cc-confirm-when{font-family:'Jost',sans-serif;font-size:13px;color:${C.sub};margin:0;}
.cc-confirm-perf{height:2px;margin:20px 0;
  background:repeating-linear-gradient(90deg,${C.rind} 0 7px,transparent 7px 14px);}
.cc-confirm-rows .cc-line{font-size:14px;color:${C.ink};}
.cc-confirm .cc-btn{margin-top:22px;}

/* login */
.cc-login{max-width:380px;margin:30px auto;background:${C.card};border:2px solid ${C.rind};
  border-radius:0;padding:28px;box-shadow:6px 6px 0 ${C.rind};}

/* member auth + member area */
.cc-auth-tabs{display:flex;border:2px solid ${C.rind};margin:16px 0 6px;}
.cc-auth-tabs .cc-tab{flex:1;padding:10px 0;}
.cc-auth-names{display:flex;gap:8px;}
.cc-auth-names .cc-input{flex:1;}
.cc-login .cc-input{margin-top:10px;}
.cc-login .cc-btn-ghost.cc-btn-block{margin-top:10px;}
.cc-authnote{background:#EAF3EC;border:1px solid ${C.sage};color:${C.sage};border-radius:0;
  padding:10px 14px;font-size:13.5px;margin-top:14px;}
.cc-member{max-width:760px;margin:0 auto;}
.cc-mem-head{display:flex;align-items:flex-end;justify-content:space-between;gap:16px;
  flex-wrap:wrap;margin-bottom:10px;}
.cc-mem-sub{font-size:13.5px;color:${C.sub};margin:6px 0 0;}
.cc-mem-section{margin-top:30px;}
.cc-mem-h{font-family:'Playfair Display',serif;font-weight:800;font-size:20px;color:${C.rind};
  margin:0 0 10px;padding-bottom:6px;border-bottom:2px solid ${C.rind};}
.cc-mem-empty{font-size:13.5px;color:${C.sub};margin:8px 0;}
.cc-mem-row{display:flex;align-items:center;gap:14px;background:${C.card};
  border:2px solid ${C.rind};border-radius:0;padding:12px 16px;margin-top:10px;}
.cc-mem-row.dim{opacity:.75;}
.cc-mem-date{display:flex;flex-direction:column;align-items:center;min-width:44px;}
.cc-mem-mon{font-family:'Jost',sans-serif;font-size:10.5px;letter-spacing:.12em;
  text-transform:uppercase;color:${C.wax};}
.cc-mem-day{font-family:'Playfair Display',serif;font-weight:900;font-size:22px;
  color:${C.rind};line-height:1.1;}
.cc-mem-info{flex:1;min-width:0;}
.cc-mem-title{font-weight:700;color:${C.ink};font-size:15px;}
.cc-mem-meta{font-size:12.5px;color:${C.sub};margin-top:2px;}
.cc-mem-right{display:flex;align-items:center;gap:10px;flex-shrink:0;}
.cc-mem-badge{font-family:'Jost',sans-serif;font-size:10.5px;letter-spacing:.08em;
  text-transform:uppercase;background:${C.sage};color:#fff;padding:3px 8px;}
@media (max-width:560px){
  .cc-mem-row{flex-wrap:wrap;}
  .cc-mem-right{width:100%;justify-content:flex-end;}
}

/* dashboard */
.cc-dash-head{display:flex;align-items:flex-end;justify-content:space-between;gap:16px;
  margin-bottom:22px;flex-wrap:wrap;}
.cc-stats{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:26px;}
.cc-stat{background:${C.card};border:2px solid ${C.rind};border-radius:0;padding:16px;}
.cc-stat-n{font-family:'Playfair Display',serif;font-weight:900;font-size:26px;color:${C.rind};line-height:1;}
.cc-stat-l{font-family:'Jost',sans-serif;font-size:10.5px;letter-spacing:.1em;text-transform:uppercase;
  color:${C.sub};margin-top:8px;}

/* tables */
.cc-table{background:${C.card};border:2px solid ${C.rind};border-radius:0;overflow:hidden;}
.cc-tr{display:grid;grid-template-columns:2.2fr 1.4fr 1.4fr 1fr 1.2fr;gap:12px;align-items:center;
  padding:14px 18px;border-top:1px solid ${C.line};font-size:14px;}
.cc-table-reg .cc-tr{grid-template-columns:2fr .6fr 1.6fr 1.8fr .9fr;align-items:start;}
.cc-tr-head{border-top:none;background:${C.rind};color:${C.paper};
  font-family:'Jost',sans-serif;font-size:11px;letter-spacing:.08em;text-transform:uppercase;}
.cc-td-title{font-weight:600;display:flex;flex-direction:column;gap:2px;}
.cc-td-sub{font-size:11.5px;color:${C.sub};font-weight:400;}
.cc-link{background:none;border:none;cursor:pointer;font-weight:700;font-size:14px;color:${C.wax};
  text-align:left;padding:0;font-family:inherit;}
.cc-link:hover{text-decoration:underline;}
.cc-bar{display:block;height:5px;background:${C.line};border-radius:0;margin-top:5px;overflow:hidden;}
.cc-bar-fill{display:block;height:100%;background:${C.cheddar};}
.cc-td-actions{display:flex;gap:8px;justify-content:flex-end;}
.cc-mini{border:1.5px solid ${C.rind};background:transparent;border-radius:0;padding:5px 10px;
  font-size:12px;font-weight:600;cursor:pointer;color:${C.rind};font-family:inherit;}
.cc-mini.danger{border-color:${C.wax};color:${C.wax};}
.cc-mini:hover{background:${C.rind};color:${C.paper};}
.cc-mini.danger:hover{background:${C.wax};color:#fff;}
.cc-empty{padding:26px;text-align:center;color:${C.sub};font-size:14px;}
.cc-faint{color:${C.faint};}
.cc-chip{display:inline-block;background:#F1E6CC;border:1px solid ${C.line};border-radius:0;
  padding:3px 8px;font-size:11.5px;margin:0 5px 5px 0;}
.cc-chip.seat{background:#E7EADD;border-color:${C.sage};color:${C.sage};}

/* seating panel */
.cc-seatpanel{background:#E7EADD;border:2px solid ${C.sage};border-radius:0;padding:18px 20px;
  margin-bottom:22px;}
.cc-seatpanel h4{font-family:'Playfair Display',serif;font-weight:800;font-size:15px;margin:0 0 12px;color:${C.sage};}
.cc-seatline{display:flex;align-items:center;gap:10px;flex-wrap:wrap;padding:5px 0;font-size:14px;}
.cc-arrow{font-family:'Jost',sans-serif;font-size:11px;color:${C.sub};text-transform:uppercase;letter-spacing:.08em;}
.cc-seatwith{font-weight:600;color:${C.sage};}

/* edit */
.cc-edit{max-width:640px;}
.cc-addons-head{display:flex;align-items:center;justify-content:space-between;margin:24px 0 10px;}
.cc-addon-row{display:flex;gap:10px;margin-bottom:10px;align-items:center;}
.cc-addon-row .cc-input{margin:0;}
.cc-edit-actions{display:flex;gap:12px;justify-content:flex-end;margin-top:26px;}

/* refunds + detail actions */
.cc-detail-actions{display:flex;gap:10px;flex-wrap:wrap;}
.cc-refundnote{background:#F1E6CC;border:1px solid ${C.cheddarDk};border-radius:0;
  padding:9px 14px;font-size:12.5px;color:${C.cheddarDk};margin-bottom:18px;
  font-family:'Jost',sans-serif;letter-spacing:.02em;}
.cc-tr.refunded{opacity:.55;}
.cc-tr.refunded .cc-td-title>b,.cc-tr.refunded .cc-mono{text-decoration:line-through;}
.cc-badge-refund{display:inline-block;background:${C.wax};color:#fff;font-family:'Jost',sans-serif;
  font-size:9.5px;letter-spacing:.1em;text-transform:uppercase;padding:2px 7px;border-radius:0;
  margin:2px 0 2px;width:max-content;}
.cc-refund-btn{display:block;margin-top:8px;}

/* print-only roster */
.cc-print-roster{display:none;}
.cc-roster-head{display:flex;justify-content:space-between;align-items:flex-start;gap:20px;
  border-bottom:2px solid #000;padding-bottom:12px;margin-bottom:14px;}
.cc-roster-shop{font-family:'Jost',sans-serif;font-size:11px;letter-spacing:.18em;text-transform:uppercase;}
.cc-roster-title{font-family:'Playfair Display',serif;font-weight:900;font-size:24px;margin-top:4px;}
.cc-roster-when{font-size:13px;margin-top:4px;}
.cc-roster-seats{font-family:'Jost',sans-serif;font-size:13px;white-space:nowrap;}
.cc-roster-table{width:100%;border-collapse:collapse;font-size:13px;}
.cc-roster-table th,.cc-roster-table td{border:1px solid #000;padding:8px 10px;text-align:left;vertical-align:top;}
.cc-roster-table th{font-family:'Jost',sans-serif;font-size:10.5px;letter-spacing:.06em;text-transform:uppercase;}
.cc-rt-check{width:34px;text-align:center;font-size:16px;}
.cc-rt-sub{font-size:11px;color:#444;}
.cc-rt-empty{text-align:center;font-style:italic;}
/* grouped seating roster (on-screen panel + print) */
.cc-rosterview{background:#FFFFFF;border:2px solid #06273A;border-radius:0;
  padding:20px;margin-bottom:22px;color:#06273A;}
.cc-rosterview-head{display:flex;justify-content:space-between;align-items:center;
  gap:12px;margin-bottom:6px;}
.cc-rosterview-head h4{margin:0;font-family:'Playfair Display',serif;font-weight:800;
  font-size:18px;color:#06273A;display:flex;align-items:center;gap:10px;}
.cc-roster-drop{display:flex;align-items:center;gap:10px;background:none;border:none;
  cursor:pointer;font-family:'Playfair Display',serif;font-weight:800;font-size:18px;
  color:#06273A;padding:0;}
.cc-roster-drop:hover{color:#7C1F15;}
.cc-caret{font-size:13px;width:14px;display:inline-block;}
.cc-rparty{border:1px solid #06273A;border-radius:0;padding:11px 14px;margin-bottom:10px;}
.cc-rparty-top{display:flex;justify-content:space-between;gap:10px;flex-wrap:wrap;
  align-items:baseline;margin-bottom:5px;}
.cc-rparty-name{font-family:'Playfair Display',serif;font-weight:800;font-size:15px;color:#06273A;}
.cc-rparty-table{font-family:'Jost',sans-serif;font-size:12px;font-weight:700;
  background:#06273A;color:#FFFFFF;border-radius:0;padding:3px 9px;letter-spacing:.04em;white-space:nowrap;}
.cc-rparty-table.unassigned{background:#7C1F15;}
.cc-rparty-seats{font-family:'Jost',sans-serif;font-size:11px;color:#5A6B7A;
  text-transform:uppercase;letter-spacing:.06em;margin-bottom:6px;}
.cc-rmember{display:flex;justify-content:space-between;gap:12px;flex-wrap:wrap;
  font-size:13.5px;color:#1A1A1A;padding:3px 0;border-top:1px dotted #C8D2DC;}
.cc-rmember:first-of-type{border-top:none;}
.cc-rmember-name{font-weight:600;}
.cc-rmember-adds{color:#7C1F15;font-size:12.5px;}

/* =====================================================================
   Brand dark theme — navy background, white text, gold accents
   (matches greyscheese.com). Overrides the light base palette above.
   ===================================================================== */
.cc-root{
  background:
    radial-gradient(circle at 22% -12%, #15406A 0, transparent 48%),
    #06273A;
  color:#E7EEF5;
}
/* header */
.cc-head{background:#0B2138;border-bottom-color:#1C4A74;}
.cc-brand{color:#FFFFFF;}
.cc-brand em{color:#9FB6CE;}
.cc-brand-mark{background:#E9B949;color:#06273A;}
.cc-modeswitch{border-color:#2A5A86;}
.cc-tab{color:#CFE0F0;}
.cc-tab.on{background:#E9B949;color:#06273A;}
/* back-office left nav */
.cc-side{background:#0B2138;border-color:#1C4A74;box-shadow:6px 6px 0 #081C30;}
.cc-side-eyebrow{color:#E9B949;}
.cc-side-label{color:#7E97AE;}
.cc-nav-item{color:#CFE0F0;}
.cc-nav-item:hover{background:#143A5C;}
.cc-nav-item.on{background:#E9B949;color:#06273A;}
.cc-nav-badge{background:#A52B1E;color:#fff;}
.cc-side-exit{border-color:#2A5A86;color:#9FB6CE;}
.cc-side-exit:hover{border-color:#E9B949;color:#E9B949;}
/* hero + type */
.cc-eyebrow{color:#E9B949;}
.cc-h1,.cc-h2{color:#FFFFFF;}
.cc-lede{color:#C3D3E4;}
.cc-foot{color:#9FB6CE;border-top-color:#1C4A74;}
.cc-loading{color:#9FB6CE;}
.cc-back,.cc-crumb{color:#E9B949;}
.cc-section{border-top-color:#1C4A74;}
.cc-section-label{color:#9FB6CE;}
/* gallery */
.cc-gallery img{border-color:#2A5A86;box-shadow:5px 5px 0 #081C30;background:#143A5C;}
/* ticket cards */
.cc-ticket{background:#143A5C;border-color:#2A5A86;box-shadow:6px 6px 0 #081C30;}
.cc-ticket.clickable{cursor:pointer;}
.cc-ticket:hover{box-shadow:9px 9px 0 #081C30;}
.cc-ticket.out:hover{box-shadow:6px 6px 0 #081C30;}
.cc-stub{background:#0B2138;color:#E7EEF5;}
.cc-stub-mon{color:#E9B949;}
.cc-stub-time{color:#9FB6CE;}
.cc-punch{background:#06273A;box-shadow:inset 0 0 0 2px #2A5A86;}
.cc-ticket-title{color:#FFFFFF;}
.cc-ticket-blurb{color:#C3D3E4;}
.cc-ticket-meta{color:#AFC2D6;}
.cc-price{color:#E9B949;}
.cc-dot{color:#3A6A96;}
.cc-seats{color:#79C9A0;}
.cc-seats.low{color:#F0A24E;}
.cc-seats.out{color:#9FB6CE;}
/* buttons */
.cc-btn-wax{background:#E9B949;color:#06273A;border-color:#E9B949;}
.cc-btn-wax:disabled{background:#2A4A66;border-color:#2A4A66;color:#7E97AE;}
.cc-btn-ghost{background:transparent;color:#E9B949;border-color:#E9B949;}
/* forms */
.cc-input{background:#0B2138;color:#EAF1F8;border-color:#2A5A86;}
.cc-input:focus{border-color:#E9B949;}
.cc-input::placeholder{color:#6F89A3;}
.cc-label{color:#C3D3E4;}
.cc-field-name{color:#FFFFFF;}
.cc-field-sub{color:#9FB6CE;}
.cc-hint{color:#9FB6CE;}
