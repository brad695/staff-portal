  email: reg.email,
  phone: reg.phone,
  qty: reg.qty,
  add_ons: reg.addOns,
  seat_with: reg.seatWith,
  notes: reg.notes,
  total: reg.total,
  user_id: reg.userId || null,
});

// ===================================================================
function App() {
  const [events, setEvents] = useState([]);
  const [regs, setRegs] = useState([]);
  const [holds, setHolds] = useState([]);
  const [loading, setLoading] = useState(true);
  const [view, setView] = useState({ name: "home" });
  const [mode, setMode] = useState("customer"); // customer | manager
  const [adminUnlocked, setAdminUnlocked] = useState(false);
  // Optional member account (Supabase Auth). Guests can always book without one.
  const [session, setSession] = useState(null);
  const user = session ? session.user : null;

  useEffect(() => {
    if (!db) return;
    db.auth.getSession().then(({ data }) => setSession(data.session || null));
    const { data: sub } = db.auth.onAuthStateChange((_evt, s) =>
      setSession(s)
    );
    return () => sub.subscription.unsubscribe();
  }, []);

  const loadAll = async () => {
    if (!db) {
      setLoading(false);
      return;
    }
    const [evRes, rgRes, hRes] = await Promise.all([
      db.from("events").select("*").order("date").order("time"),
      db.from("registrations").select("*").order("created_at"),
      db.from("holds").select("*").order("created_at"),
    ]);
    setEvents((evRes.data || []).map(eventFromRow));
    setRegs((rgRes.data || []).map(regFromRow));
    setHolds((hRes.data || []).map(holdFromRow));
    setLoading(false);
  };

  useEffect(() => {
    loadAll();
  }, []);

  // Always land at the top when moving to a new page/view (otherwise the
  // previous scroll position carries over and a long form opens mid-page).
  useEffect(() => {
    if (typeof window === "undefined") return;
    window.scrollTo(0, 0);
    if (document.scrollingElement) document.scrollingElement.scrollTop = 0;
  }, [view, mode]);

  // Make the browser Back/Forward buttons move between views. Each view change
  // pushes a history entry; popstate restores the view it points to.
  const fromPop = useRef(false); // true while applying a back/forward
  const navStarted = useRef(false); // first entry is replaced, not pushed
  useEffect(() => {
    if (typeof window === "undefined") return;
    const onPop = (e) => {
      fromPop.current = true;
      const s = e.state && e.state.ccView;
      if (s) {
        setMode(e.state.ccMode || "customer");
        setView(s);
      } else {
        setView({ name: "home" });
      }
    };
    window.addEventListener("popstate", onPop);
    return () => window.removeEventListener("popstate", onPop);
  }, []);
  useEffect(() => {
    if (loading || typeof window === "undefined") return;
    if (fromPop.current) {
      fromPop.current = false; // this change came from Back/Forward; don't re-push
      return;
    }
    const entry = { ccView: view, ccMode: mode };
    if (!navStarted.current) {
      navStarted.current = true;
      window.history.replaceState(entry, "");
    } else {
      window.history.pushState(entry, "");
    }
  }, [view, mode, loading]);

  // Shared links: ?booking=… read-only summary; ?event=…&group=… → book that
  // event/class joining the given table/group.
  useEffect(() => {
    if (loading || typeof window === "undefined") return;
    const p = new URLSearchParams(window.location.search);
    const bookingId = p.get("booking");
    if (bookingId && regs.some((r) => r.id === bookingId)) {
      setMode("customer");
      setView({ name: "booking", regId: bookingId });
      return;
    }
    const grp = p.get("group");
    const evId = p.get("event");
    if (grp && evId && events.some((e) => e.id === evId)) {
      setMode("customer");
      setView({ name: "book", eventId: evId, joinGroup: grp });
    }
  }, [loading]);

  // Seats actually booked (paid) on a given table of a tabled event.
  const bookedOnTable = (eventId, table) =>
    regs
      .filter((r) => r.eventId === eventId && !r.refunded && r.group === table)
      .reduce((s, r) => s + r.qty, 0);
  // A live hold = a reserved table whose 48h window hasn't passed yet.
  const liveHoldsFor = (eventId) =>
    holds.filter(
      (h) =>
        h.eventId === eventId &&
        h.status === "held" &&
        new Date(h.expiresAt) > new Date()
    );
  // Held-but-not-yet-bought seats on reserved tables still occupy capacity.
  const heldExtraSeats = (eventId) =>
    liveHoldsFor(eventId).reduce(
      (s, h) => s + Math.max(0, h.partySize - bookedOnTable(eventId, h.tableName)),
      0
    );

  // Refunded bookings free their seats and drop out of net revenue. A reserved
  // table also holds its still-open seats against capacity until it's filled or
  // its 48h window lapses.
  const soldFor = (eventId) =>
    regs
      .filter((r) => r.eventId === eventId && !r.refunded)
      .reduce((s, r) => s + r.qty, 0) + heldExtraSeats(eventId);
  const revenueFor = (eventId) =>
    regs
      .filter((r) => r.eventId === eventId && !r.refunded)
      .reduce((s, r) => s + r.total, 0);

  const addHold = async (hold) => {
    if (!db) return null;
    const { data, error } = await db
      .from("holds")
      .insert(holdToRow(hold))
      .select()
      .single();
    if (error || !data) return null;
    const saved = holdFromRow(data);
    setHolds((p) => [...p, saved]);
    return saved;
  };
  const updateHold = async (id, patch) => {
    if (!db) return null;
    const { data } = await db
      .from("holds")
      .update(patch)
      .eq("id", id)
      .select()
      .single();
    if (!data) return null;
    const saved = holdFromRow(data);
    setHolds((p) => p.map((h) => (h.id === id ? saved : h)));
    return saved;
  };
  // After a booking on a tabled event, keep that table's 48h hold in sync:
  // start one if the table now has open seats, clear it once the table is full.
  const syncTableHold = async (ev, table, addedQty) => {
    if (!ev || ev.kind !== "event_tabled" || !table) return;
    const bookedNow = bookedOnTable(ev.id, table) + (addedQty || 0);
    const existing = holds.find(
      (h) => h.eventId === ev.id && h.tableName === table
    );
    if (bookedNow >= ev.partySize) {
      if (existing && existing.status === "held")
        await updateHold(existing.id, { status: "booked" });
      return;
    }
    const expiresAt = new Date(
      Date.now() + HOLD_HOURS * 3600 * 1000
    ).toISOString();
    const active =
      existing &&
      existing.status === "held" &&
      new Date(existing.expiresAt) > new Date();
    if (active) return; // keep the running timer
    if (existing) {
      await updateHold(existing.id, { status: "held", expires_at: expiresAt });
    } else {
      await addHold({
        id: uid("hold"),
        eventId: ev.id,
        tableName: table,
        token: holdToken(),
        organizerName: "",
        organizerEmail: "",
        partySize: ev.partySize,
        seatPrice: ev.price,
        seats: [],
        status: "held",
        expiresAt,
      });
    }
  };

  const addReg = async (reg) => {
    if (!db) return null;
    const { data, error } = await db
      .from("registrations")
      .insert(regToRow(reg))
      .select()
      .single();
    if (error || !data) return null;
    const saved = regFromRow(data);
    setRegs((prev) => [...prev, saved]);
    return saved;
  };

  const refundReg = async (regId) => {
    if (!db) return;
    const { data } = await db
      .from("registrations")
      .update({ refunded: true, refunded_at: new Date().toISOString() })
      .eq("id", regId)
      .select()
      .single();
    if (data) {
      const saved = regFromRow(data);
      setRegs((prev) => prev.map((r) => (r.id === regId ? saved : r)));
    }
  };

  // Manager edits to a booking (guest names, seating, group, headcount).
  const updateReg = async (regId, patch) => {
    if (!db) return;
    const cur = regs.find((r) => r.id === regId);
    if (!cur) return;
    const merged = { ...cur, ...patch };
    const row = {
      qty: merged.qty,
      total: merged.total,
      seat_with: merged.seatWith,
      add_ons: merged.addOns,
      notes: buildNotes(cur.notes, merged.guests, merged.group),
    };
    const { data } = await db
      .from("registrations")
      .update(row)
      .eq("id", regId)
      .select()
      .single();
    if (data) {
      const saved = regFromRow(data);
      setRegs((prev) => prev.map((r) => (r.id === regId ? saved : r)));
    }
  };

  const saveEvent = async (ev, isEdit) => {
    if (!db) return;
    if (isEdit) {
      const { data } = await db
        .from("events")
        .update(eventToRow(ev))
        .eq("id", ev.id)
        .select()
        .single();
      if (data) {
        const s = eventFromRow(data);
        setEvents((prev) => prev.map((e) => (e.id === ev.id ? s : e)));
      }
    } else {
      const { data } = await db
        .from("events")
        .insert(eventToRow(ev))
        .select()
        .single();
      if (data) setEvents((prev) => [...prev, eventFromRow(data)]);
    }
  };

  const deleteEvent = async (id) => {
    if (!db) return;
    await db.from("events").delete().eq("id", id);
    setEvents((prev) => prev.filter((e) => e.id !== id));
    setRegs((prev) => prev.filter((r) => r.eventId !== id));
  };

  const go = (name, params = {}) => setView({ name, ...params });

  // A member's bookings: anything made while signed in (user_id) plus guest
  // bookings that used the same email — so past purchases are claimed for free.
  const myRegs = user
    ? regs.filter(
        (r) =>
          !r.refunded &&
          (r.userId === user.id ||
            (r.email || "").trim().toLowerCase() ===
              (user.email || "").trim().toLowerCase())
      )
    : [];

  const signOut = async () => {
    if (db) await db.auth.signOut();
    setMode("customer");
    setView({ name: "home" });
  };

  const switchMode = (m) => {
    setMode(m);
    if (m === "manager") setView({ name: adminUnlocked ? "admin" : "login" });
    else setView({ name: "home" });
  };

  if (loading) {
    return (
      <div className="cc-root">
        <Style />
        <div className="cc-loading">Slicing the wheel…</div>
      </div>
    );
  }

  return (
    <div className="cc-root">
      <Style />
      <header className="cc-head">
        <button className="cc-brand" onClick={() => switchMode("customer")}>
          <span className="cc-brand-mark">◷</span>
          <span>
            GREYS
            <em>classes &amp; events</em>
          </span>
        </button>
        <div className="cc-modeswitch">
          <button
            className={
              "cc-tab" +
              (mode === "customer" &&
              view.name !== "member" &&
              view.name !== "auth"
                ? " on"
                : "")
            }
            onClick={() => switchMode("customer")}
          >
            Book a class
          </button>
          <button
            className={
              "cc-tab" +
              (mode === "customer" &&
              (view.name === "member" || view.name === "auth")
                ? " on"
                : "")
            }
            onClick={() => {
              setMode("customer");
              go(user ? "member" : "auth");
            }}
          >
            {user ? "My classes" : "Sign in"}
          </button>
          <button
            className={"cc-tab" + (mode === "manager" ? " on" : "")}
            onClick={() => switchMode("manager")}
          >
            Manager
          </button>
        </div>
      </header>

      <main
        className={
          "cc-main" +
          (mode === "manager" && adminUnlocked && view.name !== "login"
            ? " cc-main-wide"
            : "")
        }
      >
        {mode === "customer" && view.name === "home" && (
          <CustomerHome events={events} soldFor={soldFor} go={go} />
        )}
        {mode === "customer" && view.name === "auth" && (
          <AuthView
            prefillEmail={view.prefillEmail || ""}
            startTab={view.signup ? "signup" : "signin"}
            onDone={() => go("member")}
            onCancel={() => go("home")}
          />
        )}
        {mode === "customer" &&
          view.name === "member" &&
          (user ? (
            <MemberArea
              user={user}
              events={events}
              myRegs={myRegs}
              soldFor={soldFor}
              go={go}
              onSignOut={signOut}
            />
          ) : (
            <AuthView onDone={() => go("member")} onCancel={() => go("home")} />
          ))}
        {mode === "customer" && view.name === "book" && (() => {
          const bookEv = events.find((e) => e.id === view.eventId);
          if (!bookEv) return null;
          const remaining = bookEv.capacity - soldFor(bookEv.id);
          return (
            <Booking
              ev={bookEv}
              user={user}
              joinGroup={view.joinGroup || ""}
              existingGroups={groupSummary(
                regs.filter((r) => r.eventId === bookEv.id)
              )}
              remaining={remaining}
              tableMode={bookEv.kind === "event_tabled"}
              showGroups={bookEv.groupSeating !== false}
              tableHolds={Object.fromEntries(
                holds
                  .filter(
                    (h) =>
                      h.eventId === bookEv.id &&
                      h.status === "held" &&
                      new Date(h.expiresAt) > new Date()
                  )
                  .map((h) => [h.tableName, h.expiresAt])
              )}
              onCancel={() => go("home")}
              onConfirm={async (reg, payInfo) => {
                const saved = await addReg(reg);
                if (saved) {
                  if (bookEv.kind === "event_tabled" && saved.group)
                    await syncTableHold(bookEv, saved.group, saved.qty);
                  sendConfirmationEmail(saved, bookEv, payInfo);
                  go("confirm", { regId: saved.id, payInfo });
                }
              }}
            />
          );
        })()}
        {mode === "customer" && view.name === "confirm" && (
          <Confirmation
            reg={regs.find((r) => r.id === view.regId)}
            ev={events.find(
              (e) =>
                e.id === (regs.find((r) => r.id === view.regId) || {}).eventId
            )}
            payInfo={view.payInfo}
            user={user}
            go={go}
            onDone={() => go("home")}
          />
        )}
        {mode === "customer" && view.name === "booking" && (
          <BookingView
            reg={regs.find((r) => r.id === view.regId)}
            ev={events.find(
              (e) =>
                e.id === (regs.find((r) => r.id === view.regId) || {}).eventId
            )}
            go={go}
          />
        )}

        {mode === "manager" && view.name === "login" && (
          <AdminLogin
            onUnlock={() => {
              setAdminUnlocked(true);
              go("admin");
            }}
          />
        )}

        {mode === "manager" && adminUnlocked && view.name !== "login" && (
          <div className="cc-admin-shell">
            <AdminNav
              view={view}
              holds={holds}
              go={go}
              onExit={() => switchMode("customer")}
            />
            <div className="cc-admin-content">
              {view.name === "admin" && (
                <AdminDash
                  events={events}
                  regs={regs}
                  soldFor={soldFor}
                  revenueFor={revenueFor}
                  go={go}
                  onDelete={(id) => deleteEvent(id)}
                />
              )}
              {view.name === "report" && (
                <AdminReport events={events} regs={regs} />
              )}
              {view.name === "bulk" && (
                <AdminBulk
                  go={go}
                  onImport={async (evs) => {
                    for (const one of evs) await saveEvent(one, false);
                  }}
                />
              )}
              {view.name === "edit" && (
                <AdminEdit
                  ev={
                    view.eventId
                      ? events.find((e) => e.id === view.eventId)
                      : null
                  }
                  kind={view.kind || "class"}
                  onCancel={() => go("admin")}
                  onSave={async (evs) => {
                    const list = Array.isArray(evs) ? evs : [evs];
                    for (const one of list) {
                      const exists = events.some((e) => e.id === one.id);
                      await saveEvent(one, exists);
                    }
                    go("admin");
                  }}
                />
              )}
              {view.name === "detail" && (
                <AdminDetail
                  ev={events.find((e) => e.id === view.eventId)}
                  regs={regs.filter((r) => r.eventId === view.eventId)}
                  soldFor={soldFor}
                  go={go}
                  onRefund={refundReg}
                  onUpdate={updateReg}
                  onAddComp={async (arr) => {
                    for (const r of arr) await addReg(r);
                  }}
                />
              )}
              {view.name === "holds" && (
                <AdminHolds
                  holds={holds}
                  events={events}
                  bookedOnTable={bookedOnTable}
                  go={go}
                  onRelease={(id) =>
                    updateHold(id, {
                      status: "released",
                      expires_at: new Date().toISOString(),
                    })
                  }
                />
              )}
            </div>
          </div>
        )}
      </main>

      <footer className="cc-foot">
        Preview · no online payment is collected · bookings saved to the database
      </footer>
    </div>
  );
}

// ---------- customer: schedule ----------
function CustomerHome({ events, soldFor, go }) {
  const today = todayStr();
  const [loc, setLoc] = useState(""); // nothing shows until a location is picked
  const upcoming = [...events]
    .filter((e) => e.date >= today && (e.location || "Memphis") === loc)
    .sort((a, b) => (a.date + a.time).localeCompare(b.date + b.time));
  return (
    <div className="cc-home">
      <div className="cc-hero">
        <p className="cc-eyebrow">On the schedule</p>
        <h1 className="cc-h1">Events and Classes</h1>
        <div className="cc-locs">
          {LOCATIONS.map((l) => (
            <button
              key={l}
              className={"cc-loc" + (l === loc ? " on" : "")}
              onClick={() => setLoc(l)}
            >
              {l}
            </button>
          ))}
        </div>
      </div>

      <div className="cc-gallery">
        {imagesFor(loc || "Memphis").map((img, i) => (
          <img
            key={img.src}
            src={img.src}
            alt={img.alt}
            onError={(e) => {
              if (!e.target.dataset.fb) {
                e.target.dataset.fb = "1";
                const fb = LOCATION_IMAGES.Memphis[i % LOCATION_IMAGES.Memphis.length];
                e.target.src = fb.src;
              }
            }}
          />
        ))}
      </div>

      {!loc && (
        <div className="cc-about">
          <p className="cc-pick-loc">
            Pick a location above to see upcoming events and classes.
          </p>
          <p>
            At Greys, we are all about education! We want to see our turophiles
            (cheese lovers) expand their knowledge of all things cheese. Learn
            about different styles, flavors, terroir and how to perfectly pair
            your cheeses. Learn to enjoy cheese with chocolate, wine, bourbon and
            much more! The possibilities with cheese are endless! We are committed
            to visiting cheese creameries in the US and around the world and
            bringing back knowledge to share with our mongers and turophiles.
            There are endless opportunities for learning when it comes to cheese,
            and the best part of our job is sharing it with you!
          </p>
          <p>
            We offer classes in all our locations every week. Make it a date
            night, Girls Night Out, or just nerd out with us solo at one of our
            classes. You can also find us at food festivals or collaborating with
            others like restaurants, breweries and lots more! Can't make it to one
            of our classes? Want to host a class in your venue? We have options for
            you. With our new in-home tasting experience you can host your own
            experience at home or hire one of our cheesemongers for a guided
            experience at your venue. Contact us at{" "}
            <a href="mailto:info@greyscheese.com">info@greyscheese.com</a> and let
            us bring the cheese knowledge to your venue.
          </p>
          <h3 className="cc-about-h">Corporate &amp; Team Building Workshops</h3>
          <p>
            Host a cheese class for your clients or employees! Learning about
            cheese and charcuterie is actually quite fun! Our expert cheesemongers
            will bring the knowledge to your events. Whether you have a small group
            or large corporate event, our cheesemongers will guide you on a cheese
            tasting. We can teach your group about cheese basics with our cheese
            101 experience, learn how to make the perfect cheese and charcuterie
            board or learn about how to pair cheese with wine, beer and so much
            more. We can customize your event and work with small or large budgets.
            Contact us at{" "}
            <a href="mailto:info@greyscheese.com">info@greyscheese.com</a> for more
            information.
          </p>
        </div>
      )}

      {loc && (
      <div className="cc-grid">
        {upcoming.length === 0 && (
          <p className="cc-lede" style={{ opacity: 0.85 }}>
            Nothing on the schedule in {loc} right now — check back soon, or pick
            another location above.
          </p>
        )}
        {upcoming.map((ev) => {
          const sold = soldFor(ev.id);
          const left = ev.capacity - sold;
          const out = left <= 0;
          const low = !out && left <= Math.max(2, Math.ceil(ev.capacity * 0.2));
          return (
            <article
              key={ev.id}
              className={"cc-ticket" + (out ? " out" : " clickable")}
              onClick={() => !out && go("book", { eventId: ev.id })}
            >
              <div className="cc-stub">
                <span className="cc-stub-mon">{monShort(ev.date)}</span>
                <span className="cc-stub-day">{dayNum(ev.date)}</span>
                <span className="cc-stub-time">{fmtTime(ev.time)}</span>
                <span className="cc-punch" />
              </div>
              <div className="cc-perf" />
              <div className="cc-ticket-body">
                <h3 className="cc-ticket-title">{ev.title}</h3>
                <p className="cc-ticket-blurb">{ev.blurb}</p>
                <div className="cc-ticket-meta">
                  <span className="cc-price">{money(ev.price)}</span>
                  <span className="cc-dot">·</span>
                  <span>{ev.durationMin} min</span>
                  {ev.addOns.length > 0 && (
                    <>
                      <span className="cc-dot">·</span>
                      <span>{ev.addOns.length} upgrades</span>
                    </>
                  )}
                </div>
                <div className="cc-ticket-foot">
                  <span
                    className={
                      "cc-seats" + (out ? " out" : low ? " low" : "")
                    }
                  >
                    {out
                      ? "Sold out"
                      : low
                      ? `Only ${left} ${left === 1 ? "seat" : "seats"} available`
                      : `${left} ${left === 1 ? "seat" : "seats"} available`}
                  </span>
                  <button
                    className="cc-btn cc-btn-wax"
                    disabled={out}
                    onClick={() => go("book", { eventId: ev.id })}
                  >
                    {out ? "Full" : "Reserve"}
                  </button>
                </div>
              </div>
            </article>
          );
        })}
      </div>
      )}
    </div>
  );
}

// ---------- customer: booking ----------
function Booking({ ev, user = null, remaining, onCancel, onConfirm, joinGroup, existingGroups, showGroups = true, backLabel = "← All classes", tableMode = false, tableHolds = {} }) {
  const [qty, setQty] = useState(1);
  const [guests, setGuests] = useState([
    { first: "", last: "", opts: [], none: false },
  ]);
  const [notes, setNotes] = useState("");
  // Signed-in members get their details prefilled; guests start blank.
  const meta = (user && user.user_metadata) || {};
  const metaFull = (meta.full_name || "").trim().split(" ");
  const [pFirst, setPFirst] = useState(meta.first_name || metaFull[0] || "");
  const [pLast, setPLast] = useState(
    meta.last_name || metaFull.slice(1).join(" ") || ""
  );
  const name = `${pFirst.trim()} ${pLast.trim()}`.trim(); // purchaser full name
  const [email, setEmail] = useState(user ? user.email || "" : "");
  const [phone, setPhone] = useState("");
  const [err, setErr] = useState("");
  const [tried, setTried] = useState(false); // highlight missing fields in red
  // Group is required: pick an existing cheese-named group, start a new one,
  // or explicitly choose "just me". Default is unselected so it can't be skipped.
  const groups = existingGroups || [];
  const usedNames = groups.map((g) => g.name);
  const availableNames = GROUP_NAMES.filter((n) => !usedNames.includes(n));
  const SOLO = "__solo__";
  // When group seating is turned off, everyone is just their own party.
  const [group, setGroup] = useState(joinGroup || (showGroups ? "" : SOLO));
  // Tabled events: a "table" is a named group capped at ev.partySize seats. The
  // number of seats you can buy is limited by the chosen table's open seats.
  const partySize = ev && ev.partySize > 1 ? ev.partySize : 1;
  const seatsTakenOn = (nm) => {
    const g = groups.find((x) => x.name === nm);
    return g ? g.members.length : 0;
  };
  // Only tables that still have an open seat can be joined.
  const openTables = tableMode
    ? groups.filter((g) => g.members.length < partySize)
    : [];
  const tableOpenSeats =
    group && group !== SOLO ? partySize - seatsTakenOn(group) : partySize;
  // A table that's already on hold has its open seats reserved (and already
  // counted against capacity), so an invitee can claim them regardless of how
  // many general seats remain. A brand-new table is limited by overall space.
  const tableHeld = tableMode && group && group !== SOLO && !!tableHolds[group];
  const seatMax = tableMode
    ? tableHeld
      ? Math.max(1, tableOpenSeats)
      : Math.max(1, Math.min(remaining, tableOpenSeats))
    : Math.max(1, remaining);
  // Whole-table purchase needs a fresh, empty table and room for everyone.
  const canWhole = remaining >= partySize && availableNames.length > 0;
  // payment / gift card
  const [giftCode, setGiftCode] = useState("");
  const [giftApplied, setGiftApplied] = useState(0); // cents covered by gift card
  const [giftMsg, setGiftMsg] = useState("");
  const [card, setCard] = useState({ num: "", exp: "", cvc: "", zip: "" });

  if (!ev) return null;

  const addOnById = (id) => ev.addOns.find((x) => x.id === id);
  const guestExtra = (g) =>
    g.opts.reduce((s, id) => s + (addOnById(id)?.price || 0), 0);
  // Count how many guests selected each upgrade.
  const optCounts = {};
  guests.forEach((g) =>
    g.opts.forEach((id) => {
      optCounts[id] = (optCounts[id] || 0) + 1;
    })
  );
  const subtotal = guests.reduce((s, g) => s + ev.price + guestExtra(g), 0);
  const tax = Math.round(subtotal * TAX_RATE); // sales tax on the subtotal
  const fee = Math.round((subtotal + tax) * FEE_RATE); // 6% processing surcharge
  const total = subtotal + tax + fee;
  const gift = Math.min(giftApplied, total);
  const due = Math.max(0, total - gift);
  const cardDigits = card.num.replace(/\D/g, "");
  const cardOk = cardDigits.length >= 13 && !!card.exp.trim() && !!card.cvc.trim();

  // Per-field validity (only flagged red after a submit attempt).
  const emailBad = !email.trim() || !/.+@.+\..+/.test(email);
  const bad = {
    group: tried && !group,
    pFirst: tried && !pFirst.trim(),
    pLast: tried && !pLast.trim(),
    email: tried && emailBad,
    card: tried && due > 0 && !cardOk,
  };
  const guestBad = (g) => ({
    first: tried && !g.first.trim(),
    last: tried && !g.last.trim(),
    opts: tried && ev.addOns.length > 0 && g.opts.length === 0 && !g.none,
  });
  const inv = (cond) => "cc-input" + (cond ? " invalid" : "");
  const formInvalid =
    !group ||
    !pFirst.trim() ||
    !pLast.trim() ||
    emailBad ||
    (due > 0 && !cardOk) ||
    guests.some(
      (g) =>
        !g.first.trim() ||
        !g.last.trim() ||
        (ev.addOns.length > 0 && g.opts.length === 0 && !g.none)
    );
  // Jump to (and focus) the first red field so it's never missed off-screen.
  const scrollToFirstInvalid = () => {
    if (typeof document === "undefined") return;
    setTimeout(() => {
      const el = document.querySelector(".cc-book .invalid");
      if (el) {
        el.scrollIntoView({ behavior: "smooth", block: "center" });
        if (el.focus) el.focus({ preventScroll: true });
      }
    }, 60);
  };

  const applyGift = () => {
    const c = giftCode.trim();
    if (!c) {
      setGiftMsg("Enter a gift card number to apply.");
      return;
    }
    if (PAYMENTS.mode === "test") {
      const bal = PAYMENTS.giftTestBalance;
      const use = Math.min(bal, total);
      setGiftApplied(use);
      setGiftMsg(`Applied ${money(use)} (test balance ${money(bal)}).`);
    } else {
      setGiftMsg("Live gift cards aren't configured yet — add Heartland keys.");
    }
  };
  const removeGift = () => {
    setGiftApplied(0);
    setGiftMsg("");
  };

  // Resizing the ticket count grows/shrinks the per-guest rows.
  const setCount = (n) => {
    n = Math.max(1, Math.min(n, seatMax));
    setQty(n);
    setGuests((prev) => {
      const next = prev.slice(0, n);
      while (next.length < n)
        next.push({ first: "", last: "", opts: [], none: false });
      return next;
    });
  };
  // Resize qty + per-seat rows to exactly n.
  const resizeGuests = (n) => {
    n = Math.max(1, n);
    setQty(n);
    setGuests((prev) => {
      const next = prev.slice(0, n);
      while (next.length < n)
        next.push({ first: "", last: "", opts: [], none: false });
      return next;
    });
  };
  // Picking a table clamps the seat count to that table's open seats.
  const chooseTable = (nm) => {
    setGroup(nm);
    const open = nm && nm !== SOLO ? partySize - seatsTakenOn(nm) : partySize;
    const held = nm && nm !== SOLO && !!tableHolds[nm];
    const cap = held ? Math.max(1, open) : Math.max(1, Math.min(remaining, open));
    resizeGuests(Math.min(qty, cap));
  };
  // "Buy the whole table" → start a fresh full table and take every seat.
  const buyWhole = () => {
    const nm = availableNames[0] || group;
    setGroup(nm);
    resizeGuests(partySize);
  };
  // "Split pay" → buy a single seat; others claim the rest via the share link.
  const reserveOne = () => resizeGuests(1);
  const setGuest = (i, patch) =>
    setGuests((prev) => prev.map((g, j) => (j === i ? { ...g, ...patch } : g)));
  const toggleOpt = (i, id) =>
    setGuests((prev) =>
      prev.map((g, j) =>
        j === i
          ? {
              ...g,
              none: false,
              opts: g.opts.includes(id)
                ? g.opts.filter((x) => x !== id)
                : [...g.opts, id],
            }
          : g
      )
    );
  const toggleNone = (i) =>
    setGuests((prev) =>
      prev.map((g, j) =>
        j === i ? { ...g, none: !g.none, opts: [] } : g
      )
    );

  const submit = () => {
    setTried(true);
    const guestsBad = guests.some((g) => !g.first.trim() || !g.last.trim());
    const optsBad =
      ev.addOns.length > 0 &&
      guests.some((g) => g.opts.length === 0 && !g.none);
    const cardMissing = due > 0 && !cardOk;
    // Any required field missing → stop, jump to the first red field.
    if (
      guestsBad ||
      optsBad ||
      !group ||
      !pFirst.trim() ||
      !pLast.trim() ||
      emailBad ||
      cardMissing
    ) {
      setErr("");
      scrollToFirstInvalid();
      return;
    }
    // Process payment. In test mode this is simulated — no real charge.
    let payInfo;
    if (PAYMENTS.mode === "test") {
      payInfo = {
        mode: "test",
        subtotal,
        tax,
        fee,
        total,
        gift,
        card: due,
        last4: due > 0 ? cardDigits.slice(-4) : "",
        giftCode: gift > 0 ? giftCode.trim() : "",
      };
    } else {
      // LIVE: tokenize via GlobalPayments.js, then POST the token + amount to
      // PAYMENTS.chargeUrl (the heartland-charge edge function). See
      // HEARTLAND-SETUP.md. Until configured, block the charge.
      setErr(
        "Live payments aren't configured yet — add your Heartland keys and edge-function URL."
      );
      return;
    }
    setErr("");
    const chosen = ev.addOns
      .filter((a) => optCounts[a.id])
      .map((a) => ({ name: a.name, qty: optCounts[a.id], price: a.price }));
    const cleanGuests = guests.map((g) => ({
      first: g.first.trim(),
      last: g.last.trim(),
      option: g.opts
        .map((id) => addOnById(id)?.name)
        .filter(Boolean)
        .join(", "),
    }));
    const groupName = group === SOLO ? "" : group;
    onConfirm(
      {
        id: uid("reg"),
        code: code(),
        eventId: ev.id,
        name: name.trim(),
        email: email.trim(),
        phone: phone.trim(),
        qty: guests.length,
        addOns: chosen,
        seatWith: "",
        group: groupName,
        notes: buildNotes(notes, cleanGuests, groupName),
        total,
        userId: user ? user.id : null,
        createdAt: new Date().toISOString(),
      },
      payInfo
    );
  };

  // Section numbers count up as they render, so they stay contiguous whether or
  // not the table / group sections appear.
  let _n = 0;
  const sn = () => String(++_n).padStart(2, "0");

  return (
    <div className="cc-book">
      <button className="cc-back" onClick={onCancel}>
        {backLabel}
      </button>
      <div className="cc-book-grid">
        <div className="cc-book-main">
          <p className="cc-eyebrow">{fmtDateLong(ev.date)} · {fmtTime(ev.time)} · 📍 {ev.location || "Memphis"}</p>
          <h2 className="cc-h2">{ev.title}</h2>
          <p className="cc-lede">{ev.blurb}</p>

          <div className="cc-form-frame">
          {tableMode && (
            <Section label={sn() + " — Your table"}>
              <div className="cc-table-actions">
                <button
                  type="button"
                  className="cc-btn cc-btn-wax"
                  disabled={!canWhole}
                  onClick={buyWhole}
                >
                  Buy table of {partySize} ({money(ev.price * partySize)})
                </button>
                <button
                  type="button"
                  className="cc-btn cc-btn-ghost"
                  disabled={remaining < 1}
                  onClick={reserveOne}
                >
                  Split pay · reserve 1 seat ({money(ev.price)})
                </button>
              </div>
              <p className="cc-hint" style={{ marginTop: "6px" }}>
                Buy the whole table, or reserve one seat and invite others to
                claim the rest within {HOLD_HOURS} hours.
              </p>

              <label className="cc-label">Choose a table (required)</label>
              <select
                className={inv(bad.group)}
                value={group}
                onChange={(e) => chooseTable(e.target.value)}
              >
                <option value="" disabled>
                  Select a table…
                </option>
                {openTables.length > 0 && (
                  <optgroup label="Join a table others started">
                    {openTables.map((g) => (
                      <option key={g.name} value={g.name}>
                        {g.name} — {g.members.join(", ")} ({partySize - g.members.length} open)
                      </option>
                    ))}
                  </optgroup>
                )}
                {availableNames.length > 0 && (
                  <optgroup label="Start a new table">
                    {availableNames.map((n) => (
                      <option key={n} value={n}>
                        {n} (new · seats {partySize})
                      </option>
                    ))}
                  </optgroup>
                )}
              </select>

              {group && group !== SOLO && (
                <>
                  <div className="cc-table-buy">
                    <div>
                      <div className="cc-field-name">Seats you're buying now</div>
                      <div className="cc-field-sub">
                        {money(ev.price)} / seat · {tableOpenSeats} open on {group}
                      </div>
                    </div>
                    <Stepper value={qty} min={1} max={seatMax} onChange={setCount} />
                  </div>
                  {tableHolds[group] && (
                    <div className="cc-holdtimer" style={{ marginTop: "14px" }}>
                      ⏳ {timeLeft(tableHolds[group])} left to fill table {group}{" "}
                      before the open seats are released
                    </div>
                  )}
                  <div className="cc-groupbox" style={{ marginTop: "14px" }}>
                    <span className="cc-group-tag">Table {group}</span>
                    <p className="cc-hint" style={{ margin: "8px 0 6px" }}>
                      Buying fewer than {partySize}? The remaining seats are held
                      for {HOLD_HOURS} hours — share this link so your table buys
                      their seats before they’re released:
                    </p>
                    <GroupShare link={groupLink(ev.id, group)} />
                  </div>
                </>
              )}
              <p className="cc-hint">
                Everyone at a table is seated together. Tables seat {partySize}.
              </p>
            </Section>
          )}

          {!tableMode && (
            <Section label={sn() + " — Tickets"}>
              <div className="cc-stepper-row">
                <div>
                  <div className="cc-field-name">Number of tickets</div>
                  <div className="cc-field-sub">
                    {money(ev.price)} base · {remaining} seats remaining
                  </div>
                </div>
                <Stepper
                  value={qty}
                  min={1}
                  max={Math.max(1, remaining)}
                  onChange={setCount}
                />
              </div>
            </Section>
          )}

          <Section label={sn() + " — Guests"}>
            {guests.map((g, i) => {
              const gb = guestBad(g);
              return (
              <div key={i} className="cc-guest">
                <div className="cc-guest-head">
                  {tableMode ? "Seat" : "Ticket"} {i + 1}
                </div>
                <div className="cc-row2">
                  <div>
                    <label className="cc-label">First name</label>
                    <input
                      className={inv(gb.first)}
                      value={g.first}
                      onChange={(e) => setGuest(i, { first: e.target.value })}
                    />
                  </div>
                  <div>
                    <label className="cc-label">Last name</label>
                    <input
                      className={inv(gb.last)}
                      value={g.last}
                      onChange={(e) => setGuest(i, { last: e.target.value })}
                    />
                  </div>
                </div>
                {ev.addOns.length > 0 && (
                  <>
                    <label className="cc-label">
                      Add-ons (choose at least one, or “No add-ons”)
                    </label>
                    <div className={"cc-opts" + (gb.opts ? " invalid" : "")}>
                      {ev.addOns.map((a) => (
                        <label key={a.id} className="cc-check">
                          <input
                            type="checkbox"
                            checked={g.opts.includes(a.id)}
                            onChange={() => toggleOpt(i, a.id)}
                          />
                          <span>
                            {a.name} · +{money(a.price)}
                          </span>
                        </label>
                      ))}
                      <label className="cc-check cc-check-none">
                        <input
                          type="checkbox"
                          checked={g.none}
                          onChange={() => toggleNone(i)}
                        />
                        <span>No add-ons</span>
                      </label>
                    </div>
                  </>
                )}
              </div>
              );
            })}
            <p className="cc-hint">
              Add a first and last name for every ticket — each guest checks in
              under their own name.
            </p>
          </Section>

          {showGroups && !tableMode && (
          <Section label={sn() + " — Group seating"}>
            <label className="cc-label">Choose a group (required)</label>
            <select
              className={inv(bad.group)}
              value={group}
              onChange={(e) => setGroup(e.target.value)}
            >
              <option value="" disabled>
                Select an option…
              </option>
              <option value={SOLO}>
                {guests.length > 1
                  ? `No group — just my party of ${guests.length}`
                  : "No group — just me"}
              </option>
              {groups.length > 0 && (
                <optgroup label="Join an existing group">
                  {groups.map((g) => (
                    <option key={g.name} value={g.name}>
                      {g.name} - {g.members.join(", ")}
                    </option>
                  ))}
                </optgroup>
              )}
              {availableNames.length > 0 && (
                <optgroup label="Create a new group">
                  {availableNames.map((n) => (
                    <option key={n} value={n}>
                      {n} (new group)
                    </option>
                  ))}
                </optgroup>
              )}
            </select>
            <p className="cc-hint cc-hint-group">
              {availableNames.length === 0
                ? "All 10 groups for this class are taken — join one above, or choose “no group.”"
                : "Join a group your friends already made, or start a new one — we seat each group together."}
            </p>
            <p className="cc-hint">
              Everyone on this booking is always seated together. Choose a group
              only if you want to sit with people booking separately.
            </p>
            {group && group !== SOLO && (
              <div className="cc-groupbox">
                <span className="cc-group-tag">Group {group}</span>
                <p className="cc-hint" style={{ margin: "8px 0 6px" }}>
                  Share this link so friends join the {group} group and sit with
                  you:
                </p>
                <GroupShare link={groupLink(ev.id, group)} />
              </div>
            )}
          </Section>
          )}

          <Section label={sn() + " — Anything else?"}>
            <label className="cc-label">Notes (optional)</label>
            <input
              className="cc-input"
              placeholder="Allergies, dietary needs, occasion…"
              value={notes}
              onChange={(e) => setNotes(e.target.value)}
            />
          </Section>

          <Section label={sn() + " — Purchaser details"}>
            <p className="cc-field-sub" style={{ marginBottom: "10px" }}>
              Your confirmation and any class updates go to the purchaser only.
            </p>
            <div className="cc-row2">
              <div>
                <label className="cc-label">Purchaser first name</label>
                <input
                  className={inv(bad.pFirst)}
                  value={pFirst}
                  onChange={(e) => setPFirst(e.target.value)}
                />
              </div>
              <div>
                <label className="cc-label">Purchaser last name</label>
                <input
                  className={inv(bad.pLast)}
                  value={pLast}
                  onChange={(e) => setPLast(e.target.value)}
                />
              </div>
            </div>
            <div className="cc-row2">
              <div>
                <label className="cc-label">Email</label>
                <input
                  className={inv(bad.email)}
                  value={email}
                  onChange={(e) => setEmail(e.target.value)}
                />
              </div>
              <div>
                <label className="cc-label">Phone</label>
                <input
                  className="cc-input"
                  value={phone}
                  onChange={(e) => setPhone(e.target.value)}
                />
              </div>
            </div>
          </Section>

          <Section label={sn() + " — Payment"}>
            {PAYMENTS.mode === "test" && (
              <div className="cc-testbadge">
                TEST MODE · no real card is charged
              </div>
            )}

            <label className="cc-label">Gift card (optional)</label>
            {gift > 0 ? (
              <div className="cc-giftapplied">
                <span>
                  Gift card applied · <b>− {money(gift)}</b>
                </span>
                <button className="cc-mini" onClick={removeGift}>
                  Remove
                </button>
              </div>
            ) : (
              <div className="cc-giftrow">
                <input
                  className="cc-input"
                  placeholder="Gift card number"
                  value={giftCode}
                  onChange={(e) => setGiftCode(e.target.value)}
                />
                <button className="cc-btn cc-btn-ghost" onClick={applyGift}>
                  Apply
                </button>
              </div>
            )}
            {giftMsg && <p className="cc-hint">{giftMsg}</p>}

            {due > 0 ? (
              <>
                <label className="cc-label">Card number</label>
                <input
                  className={inv(bad.card)}
                  inputMode="numeric"
                  placeholder={PAYMENTS.mode === "test" ? "Test card e.g. 4242 4242 4242 4242" : "Card number"}
                  value={card.num}
                  onChange={(e) => setCard({ ...card, num: e.target.value })}
                />
                <div className="cc-row3">
                  <div>
                    <label className="cc-label">Expiry</label>
                    <input
                      className="cc-input"
                      placeholder="MM/YY"
                      value={card.exp}
                      onChange={(e) => setCard({ ...card, exp: e.target.value })}
                    />
                  </div>
                  <div>
                    <label className="cc-label">CVC</label>
                    <input
                      className="cc-input"
                      placeholder="123"
                      value={card.cvc}
                      onChange={(e) => setCard({ ...card, cvc: e.target.value })}
                    />
                  </div>
                  <div>
                    <label className="cc-label">ZIP</label>
                    <input
                      className="cc-input"
                      placeholder="38103"
                      value={card.zip}
                      onChange={(e) => setCard({ ...card, zip: e.target.value })}
                    />
                  </div>
                </div>
              </>
            ) : (
              <div className="cc-demo-pay">
                Your gift card covers the full total — no card needed.
              </div>
            )}
          </Section>

          {err && <div className="cc-err">{err}</div>}
          </div>
        </div>

        <aside className="cc-summary">
          <div className="cc-summary-card">
            <h4>Order summary</h4>
            <Line
              k={`${guests.length} × General admission`}
              v={money(guests.length * ev.price)}
            />
            {ev.addOns
              .filter((a) => optCounts[a.id])
              .map((a) => (
                <Line
                  key={a.id}
                  k={`${optCounts[a.id]} × ${a.name} upgrade`}
                  v={money(optCounts[a.id] * a.price)}
                />
              ))}
            <Line k="Sales tax" v={money(tax)} />
            <Line k="Processing fee" v={money(fee)} />
            <div className="cc-total">
              <span>Total</span>
              <span>{money(total)}</span>
            </div>
            {gift > 0 && (
              <>
                <Line k="Gift card" v={`− ${money(gift)}`} />
                <div className="cc-total">
                  <span>Due now</span>
                  <span>{money(due)}</span>
                </div>
              </>
            )}
            <button className="cc-btn cc-btn-wax cc-btn-block" onClick={submit}>
              {PAYMENTS.mode === "test" ? "Pay (test)" : "Pay"} · {money(due)}
            </button>
            {tried && formInvalid && (
              <p className="cc-needfix">
                Some required fields are missing — we've highlighted them in red
                and jumped you to the first one.
              </p>
            )}
          </div>
        </aside>
      </div>

      <PolicyFAQ />
    </div>
  );
}

// ---------- events: choose how to buy (per the manager's sale modes) ----------
function EventBooking({
  ev,
  remaining,
  existingGroups,
  joinGroup,
  onCancel,
  onConfirm,
  onReserveTable,
}) {
  // A group share-link starts the visitor on an individual seat (joining that
  // group). Lazy initializer keeps this hook first, before any early return.
  const [choice, setChoice] = useState(() => {
    if (ev && joinGroup) {
      const m = ev.saleModes && ev.saleModes.length ? ev.saleModes : ["individual"];
      if (m.includes("individual")) return "individual";
    }
    return null;
  });
  if (!ev) return null;
  const modes = ev.saleModes && ev.saleModes.length ? ev.saleModes : ["individual"];
  const canTable = remaining >= ev.partySize;

  if (choice === "individual")
    return (
      <Booking
        ev={ev}
        remaining={remaining}
        existingGroups={existingGroups}
        joinGroup={joinGroup}
        showGroups={ev.groupSeating !== false}
        backLabel={modes.length > 1 ? "← Ticket options" : "← All events"}
        onCancel={modes.length > 1 ? () => setChoice(null) : onCancel}
        onConfirm={onConfirm}
      />
    );
  if (choice === "split")
    return (
      <TableReserve
        ev={ev}
        remaining={remaining}
        onCancel={() => setChoice(null)}
        onReserve={onReserveTable}
      />
    );
  if (choice === "whole")
    return (
      <Booking
        ev={ev}
        remaining={remaining}
        lockQty={ev.partySize}
        showGroups={false}
        title={`Buy the whole table of ${ev.partySize}`}
        backLabel={modes.length > 1 ? "← Ticket options" : "← All events"}
        onCancel={modes.length > 1 ? () => setChoice(null) : onCancel}
        onConfirm={onConfirm}
      />
    );

  // Only one way to buy → skip the chooser entirely.
  if (modes.length === 1) {
    if (modes[0] === "split")
      return (
        <TableReserve
          ev={ev}
          remaining={remaining}
          onCancel={onCancel}
          onReserve={onReserveTable}
        />
      );
    const only = modes[0];
    return (
      <Booking
        ev={ev}
        remaining={remaining}
        existingGroups={existingGroups}
        joinGroup={joinGroup}
        showGroups={only === "individual" && ev.groupSeating !== false}
        lockQty={only === "table" ? ev.partySize : 0}
        title={only === "table" ? `Buy the whole table of ${ev.partySize}` : undefined}
        backLabel="← All events"
        onCancel={onCancel}
        onConfirm={onConfirm}
      />
    );
  }

  const card = (key, head, price, sub, disabled, disabledMsg) => (
    <button
      className="cc-choice"
      disabled={disabled}
      onClick={() => setChoice(key)}
    >
      <span className="cc-choice-h">{head}</span>
      <span className="cc-choice-price">{price}</span>
      <span className="cc-choice-sub">{sub}</span>
      {disabled && <span className="cc-choice-tag">{disabledMsg}</span>}
    </button>
  );

  return (
    <div className="cc-book">
      <button className="cc-back" onClick={onCancel}>
        ← All events
      </button>
      <p className="cc-eyebrow">{fmtDateLong(ev.date)} · {fmtTime(ev.time)}</p>
      <h2 className="cc-h2">{ev.title}</h2>
      {ev.blurb && <p className="cc-lede">{ev.blurb}</p>}
      <p className="cc-field-sub" style={{ marginBottom: "18px" }}>
        {remaining} of {ev.capacity} seats remaining
      </p>

      <div className="cc-choice-grid">
        {modes.includes("individual") &&
          card(
            "individual",
            "Buy single seats",
            `${money(ev.price)} / seat`,
            `Grab one or more seats and pay in full now. We’ll seat you with your party${
              ev.groupSeating !== false ? " — or join a group." : "."
            }`,
            remaining < 1,
            "Sold out"
          )}
        {modes.includes("split") &&
          card(
            "split",
            `Reserve a table for ${ev.partySize}`,
            `${money(ev.price)} / seat · split it`,
            `You pay your seat to lock the table, then share a link so each guest pays their own share. Held ${HOLD_HOURS} hours until everyone’s paid.`,
            !canTable,
            `Not enough seats left for a table of ${ev.partySize}`
          )}
        {modes.includes("table") &&
          card(
            "whole",
            `Buy the whole table of ${ev.partySize}`,
            `${money(ev.price * ev.partySize)} total`,
            `One payment now covers all ${ev.partySize} seats — no splitting, the table’s yours.`,
            !canTable,
            `Not enough seats left for a table of ${ev.partySize}`
          )}
      </div>

      <PolicyFAQ />
    </div>
  );
}

// ---------- events: organizer reserves a table & pays their seat ----------
function TableReserve({ ev, remaining, onCancel, onReserve }) {
  const [first, setFirst] = useState("");
  const [last, setLast] = useState("");
  const [email, setEmail] = useState("");
  const [opts, setOpts] = useState([]);
  const [none, setNone] = useState(false);
  const [card, setCard] = useState({ num: "", exp: "", cvc: "", zip: "" });
  const [tried, setTried] = useState(false);
  const [err, setErr] = useState("");

  const addOnById = (id) => ev.addOns.find((x) => x.id === id);
  const extra = opts.reduce((s, id) => s + (addOnById(id)?.price || 0), 0);
  const subtotal = ev.price + extra; // organizer pays only their own seat
  const tax = Math.round(subtotal * TAX_RATE);
  const fee = Math.round((subtotal + tax) * FEE_RATE);
  const total = subtotal + tax + fee;
  const cardDigits = card.num.replace(/\D/g, "");
  const cardOk = cardDigits.length >= 13 && !!card.exp.trim() && !!card.cvc.trim();
  const emailBad = !email.trim() || !/.+@.+\..+/.test(email);
  const inv = (cond) => "cc-input" + (cond ? " invalid" : "");
  const optsBad = ev.addOns.length > 0 && opts.length === 0 && !none;

  const toggleOpt = (id) =>
    setOpts((p) => {
      setNone(false);
      return p.includes(id) ? p.filter((x) => x !== id) : [...p, id];
    });

  const submit = () => {
    setTried(true);
    if (!first.trim() || !last.trim() || emailBad || optsBad || !cardOk) {
      setErr("");
      return;
    }
    if (PAYMENTS.mode !== "test") {
      setErr("Live payments aren't configured yet — add your Heartland keys.");
      return;
    }
    const option = opts
      .map((id) => addOnById(id)?.name)
      .filter(Boolean)
      .join(", ");
    // Seat 0 is the organizer (paid). The rest are open until guests pay.
    const seats = [
      {
        first: first.trim(),
        last: last.trim(),
        email: email.trim(),
        option,
        optIds: opts.slice(),
        total,
        paid: true,
        paidAt: new Date().toISOString(),
      },
      ...Array.from({ length: ev.partySize - 1 }, () => ({ paid: false })),
    ];
    const expiresAt = new Date(
      Date.now() + HOLD_HOURS * 3600 * 1000
    ).toISOString();
    onReserve(
      {
        id: uid("hold"),
        eventId: ev.id,
        token: holdToken(),
        organizerName: `${first.trim()} ${last.trim()}`.trim(),
        organizerEmail: email.trim(),
        partySize: ev.partySize,
        seatPrice: ev.price,
        seats,
        status: "held",
        expiresAt,
        createdAt: new Date().toISOString(),
      },
      { mode: "test", subtotal, tax, fee, total }
    );
  };

  return (
    <div className="cc-book">
      <button className="cc-back" onClick={onCancel}>
        ← Ticket options
      </button>
      <div className="cc-book-grid">
        <div className="cc-book-main">
          <p className="cc-eyebrow">{fmtDateLong(ev.date)} · {fmtTime(ev.time)}</p>
          <h2 className="cc-h2">Reserve a table for {ev.partySize}</h2>
          <p className="cc-lede">
            Pay your own seat now to hold the whole table. You’ll get a link to
            share — each of the other {ev.partySize - 1} guests pays their seat
            within {HOLD_HOURS} hours, or the table is released.
          </p>

          <div className="cc-form-frame">
            <Section label="01 — Your seat">
              <div className="cc-row2">
                <div>
                  <label className="cc-label">First name</label>
                  <input
                    className={inv(tried && !first.trim())}
                    value={first}
                    onChange={(e) => setFirst(e.target.value)}
                  />
                </div>
                <div>
                  <label className="cc-label">Last name</label>
                  <input
                    className={inv(tried && !last.trim())}
                    value={last}
                    onChange={(e) => setLast(e.target.value)}
                  />
                </div>
              </div>
              <label className="cc-label">Email</label>
              <input
                className={inv(tried && emailBad)}
                value={email}
                onChange={(e) => setEmail(e.target.value)}
              />
              {ev.addOns.length > 0 && (
                <>
                  <label className="cc-label">
                    Add-ons (choose at least one, or “No add-ons”)
                  </label>
                  <div className={"cc-opts" + (tried && optsBad ? " invalid" : "")}>
                    {ev.addOns.map((a) => (
                      <label key={a.id} className="cc-check">
                        <input
                          type="checkbox"
                          checked={opts.includes(a.id)}
                          onChange={() => toggleOpt(a.id)}
                        />
                        <span>
                          {a.name} · +{money(a.price)}
                        </span>
                      </label>
                    ))}
                    <label className="cc-check cc-check-none">
                      <input
                        type="checkbox"
                        checked={none}
                        onChange={() => {
                          setNone((v) => !v);
                          setOpts([]);
                        }}
                      />
                      <span>No add-ons</span>
                    </label>
                  </div>
                </>
              )}
            </Section>

            <Section label="02 — Payment">
              {PAYMENTS.mode === "test" && (
                <div className="cc-testbadge">
                  TEST MODE · no real card is charged
                </div>
              )}
              <label className="cc-label">Card number</label>
              <input
                className={inv(tried && !cardOk)}
                inputMode="numeric"
                placeholder={
                  PAYMENTS.mode === "test"
                    ? "Test card e.g. 4242 4242 4242 4242"
                    : "Card number"
                }
                value={card.num}
                onChange={(e) => setCard({ ...card, num: e.target.value })}
              />
              <div className="cc-row3">
                <div>
                  <label className="cc-label">Expiry</label>
                  <input
                    className="cc-input"
                    placeholder="MM/YY"
                    value={card.exp}
                    onChange={(e) => setCard({ ...card, exp: e.target.value })}
                  />
                </div>
                <div>
                  <label className="cc-label">CVC</label>
                  <input
                    className="cc-input"
                    placeholder="123"
                    value={card.cvc}
                    onChange={(e) => setCard({ ...card, cvc: e.target.value })}
                  />
                </div>
                <div>
                  <label className="cc-label">ZIP</label>
                  <input
                    className="cc-input"
                    placeholder="38103"
                    value={card.zip}
                    onChange={(e) => setCard({ ...card, zip: e.target.value })}
                  />
                </div>
              </div>
            </Section>
            {err && <div className="cc-err">{err}</div>}
          </div>
        </div>

        <aside className="cc-summary">
          <div className="cc-summary-card">
            <h4>Your share</h4>
            <Line k="General admission" v={money(ev.price)} />
            {ev.addOns
              .filter((a) => opts.includes(a.id))
              .map((a) => (
                <Line key={a.id} k={a.name + " upgrade"} v={money(a.price)} />
              ))}
            <Line k="Sales tax" v={money(tax)} />
            <Line k="Processing fee" v={money(fee)} />
            <div className="cc-total">
              <span>You pay now</span>
              <span>{money(total)}</span>
            </div>
            <p className="cc-hint" style={{ marginTop: "6px" }}>
              The other {ev.partySize - 1} seats are paid by your guests from the
              link you’ll get next.
            </p>
            <button
              className="cc-btn cc-btn-wax cc-btn-block"
              onClick={submit}
            >
              {PAYMENTS.mode === "test" ? "Reserve table (test)" : "Reserve table"} ·{" "}
              {money(total)}
            </button>
            {tried && (!first.trim() || !last.trim() || emailBad || optsBad || !cardOk) && (
              <p className="cc-needfix">
                Fill your name, a valid email{ev.addOns.length ? ", an add-on choice," : ""} and card details.
              </p>
            )}
          </div>
        </aside>
      </div>
      <PolicyFAQ />
    </div>
  );
}

// ---------- events: split-pay join page (?hold=token) ----------
function HoldView({ hold, ev, onPaySeat, go }) {
  const [first, setFirst] = useState("");
  const [last, setLast] = useState("");
  const [email, setEmail] = useState("");
  const [opts, setOpts] = useState([]);
  const [none, setNone] = useState(false);
  const [card, setCard] = useState({ num: "", exp: "", cvc: "", zip: "" });
  const [tried, setTried] = useState(false);
  const [busy, setBusy] = useState(false);
  // Re-render once a minute so the countdown stays fresh.
  const [, tick] = useState(0);
  useEffect(() => {
    const t = setInterval(() => tick((n) => n + 1), 60000);
    return () => clearInterval(t);
  }, []);

  if (!hold || !ev)
    return (
      <div className="cc-book">
        <h2 className="cc-h2">Reservation not found</h2>
        <p className="cc-lede">
          This table link isn’t valid or has been removed.
        </p>
        <button className="cc-btn cc-btn-wax" onClick={() => go("home")}>
          Browse events
        </button>
      </div>
    );

  const paid = seatsPaid(hold);
  const full = holdFull(hold) || hold.status === "booked";
  const expired =
    !full && (hold.status === "released" || new Date(hold.expiresAt) <= new Date());

  const addOnById = (id) => ev.addOns.find((x) => x.id === id);
  const extra = opts.reduce((s, id) => s + (addOnById(id)?.price || 0), 0);
  const subtotal = ev.price + extra;
  const tax = Math.round(subtotal * TAX_RATE);
  const fee = Math.round((subtotal + tax) * FEE_RATE);
  const total = subtotal + tax + fee;
  const cardDigits = card.num.replace(/\D/g, "");
  const cardOk = cardDigits.length >= 13 && !!card.exp.trim() && !!card.cvc.trim();
  const emailBad = !email.trim() || !/.+@.+\..+/.test(email);
  const optsBad = ev.addOns.length > 0 && opts.length === 0 && !none;
  const inv = (cond) => "cc-input" + (cond ? " invalid" : "");
  const nextOpen = hold.seats.findIndex((s) => !s || !s.paid);

  const toggleOpt = (id) =>
    setOpts((p) => {
      setNone(false);
      return p.includes(id) ? p.filter((x) => x !== id) : [...p, id];
    });

  const payShare = async () => {
    setTried(true);
    if (!first.trim() || !last.trim() || emailBad || optsBad || !cardOk) return;
    if (PAYMENTS.mode !== "test") return;
    if (nextOpen < 0) return;
    setBusy(true);
    const option = opts
      .map((id) => addOnById(id)?.name)
      .filter(Boolean)
      .join(", ");
    await onPaySeat(nextOpen, {
      first: first.trim(),
      last: last.trim(),
      email: email.trim(),
      option,
      optIds: opts.slice(),
      total,
      paidAt: new Date().toISOString(),
    });
    setBusy(false);
    setFirst("");
    setLast("");
    setEmail("");
    setOpts([]);
    setNone(false);
    setCard({ num: "", exp: "", cvc: "", zip: "" });
    setTried(false);
  };

  const seatList = (
    <div className="cc-seatlist">
      {hold.seats.map((s, i) => (
        <div
          key={i}
          className={"cc-seat" + (s && s.paid ? " paid" : "")}
        >
          <span className="cc-seat-n">Seat {i + 1}</span>
          {s && s.paid ? (
            <span className="cc-seat-name">
              {`${s.first || ""} ${s.last || ""}`.trim() || "Paid"} · paid
            </span>
          ) : (
            <span className="cc-seat-open">Open</span>
          )}
        </div>
      ))}
    </div>
  );

  return (
    <div className="cc-book">
      <button className="cc-back" onClick={() => go("home")}>
        ← All events
      </button>
      <p className="cc-eyebrow">{fmtDateLong(ev.date)} · {fmtTime(ev.time)}</p>
      <h2 className="cc-h2">{ev.title}</h2>
      <p className="cc-lede">
        {hold.organizerName} reserved a table for {hold.partySize}. {paid} of{" "}
        {hold.partySize} seats paid.
      </p>

      {!full && !expired && (
        <div className="cc-groupbox" style={{ marginBottom: "18px" }}>
          <span className="cc-group-tag">Share this table</span>
          <p className="cc-hint" style={{ margin: "8px 0 8px" }}>
            Send this link to the other {hold.partySize - paid} guest
            {hold.partySize - paid === 1 ? "" : "s"} so each pays their seat
            before the {HOLD_HOURS}-hour hold ends:
          </p>
          <GroupShare link={holdLink(hold.token)} />
        </div>
      )}

      {full ? (
        <div className="cc-confirm-card">
          <div className="cc-confirm-badge">✓ Table confirmed</div>
          <p>Every seat is paid — you’re all booked. See you there!</p>
          {seatList}
        </div>
      ) : expired ? (
        <div className="cc-demo-pay">
          This table’s {HOLD_HOURS}-hour hold has ended, so it was released.
          Paid guests are refunded in test mode automatically. You can still grab
          single seats from the event page.
          <div style={{ marginTop: "12px" }}>
            <button
              className="cc-btn cc-btn-wax"
              onClick={() => go("book", { eventId: ev.id })}
            >
              See event
            </button>
          </div>
        </div>
      ) : (
        <div className="cc-book-grid">
          <div className="cc-book-main">
            <div className="cc-holdtimer">
              ⏳ {timeLeft(hold.expiresAt)} left to fill this table
            </div>
            {seatList}

            <div className="cc-form-frame">
              <Section label="Pay your seat">
                <div className="cc-row2">
                  <div>
                    <label className="cc-label">First name</label>
                    <input
                      className={inv(tried && !first.trim())}
                      value={first}
                      onChange={(e) => setFirst(e.target.value)}
                    />
                  </div>
                  <div>
                    <label className="cc-label">Last name</label>
                    <input
                      className={inv(tried && !last.trim())}
                      value={last}
                      onChange={(e) => setLast(e.target.value)}
                    />
                  </div>
                </div>
                <label className="cc-label">Email</label>
                <input
                  className={inv(tried && emailBad)}
                  value={email}
                  onChange={(e) => setEmail(e.target.value)}
                />
                {ev.addOns.length > 0 && (
                  <>
                    <label className="cc-label">
                      Add-ons (choose at least one, or “No add-ons”)
                    </label>
                    <div className={"cc-opts" + (tried && optsBad ? " invalid" : "")}>
                      {ev.addOns.map((a) => (
                        <label key={a.id} className="cc-check">
                          <input
                            type="checkbox"
                            checked={opts.includes(a.id)}
                            onChange={() => toggleOpt(a.id)}
                          />
                          <span>
                            {a.name} · +{money(a.price)}
                          </span>
                        </label>
                      ))}
                      <label className="cc-check cc-check-none">
                        <input
                          type="checkbox"
                          checked={none}
                          onChange={() => {
                            setNone((v) => !v);
                            setOpts([]);
                          }}
                        />
                        <span>No add-ons</span>
                      </label>
                    </div>
                  </>
                )}
              </Section>

              <Section label="Payment">
                {PAYMENTS.mode === "test" && (
                  <div className="cc-testbadge">
                    TEST MODE · no real card is charged
                  </div>
                )}
                <label className="cc-label">Card number</label>
                <input
                  className={inv(tried && !cardOk)}
                  inputMode="numeric"
                  placeholder={
                    PAYMENTS.mode === "test"
                      ? "Test card e.g. 4242 4242 4242 4242"
                      : "Card number"
                  }
                  value={card.num}
                  onChange={(e) => setCard({ ...card, num: e.target.value })}
                />
                <div className="cc-row3">
                  <div>
                    <label className="cc-label">Expiry</label>
                    <input
                      className="cc-input"
                      placeholder="MM/YY"
                      value={card.exp}
                      onChange={(e) => setCard({ ...card, exp: e.target.value })}
                    />
                  </div>
                  <div>
                    <label className="cc-label">CVC</label>
                    <input
                      className="cc-input"
                      placeholder="123"
                      value={card.cvc}
                      onChange={(e) => setCard({ ...card, cvc: e.target.value })}
                    />
                  </div>
                  <div>
                    <label className="cc-label">ZIP</label>
                    <input
                      className="cc-input"
                      placeholder="38103"
                      value={card.zip}
                      onChange={(e) => setCard({ ...card, zip: e.target.value })}
                    />
                  </div>
                </div>
              </Section>
            </div>
          </div>

          <aside className="cc-summary">
            <div className="cc-summary-card">
              <h4>Your share</h4>
              <Line k="General admission" v={money(ev.price)} />
              {ev.addOns
                .filter((a) => opts.includes(a.id))
                .map((a) => (
                  <Line key={a.id} k={a.name + " upgrade"} v={money(a.price)} />
                ))}
              <Line k="Sales tax" v={money(tax)} />
              <Line k="Processing fee" v={money(fee)} />
              <div className="cc-total">
                <span>You pay</span>
                <span>{money(total)}</span>
              </div>
              <button
                className="cc-btn cc-btn-wax cc-btn-block"
                onClick={payShare}
                disabled={busy}
              >
                {busy
                  ? "Processing…"
                  : (PAYMENTS.mode === "test" ? "Pay my seat (test)" : "Pay my seat") +
                    " · " +
                    money(total)}
              </button>
              <p className="cc-hint" style={{ marginTop: "8px" }}>
                When the last seat is paid, the whole table is booked and the
                organizer gets the confirmation.
              </p>
            </div>
          </aside>
        </div>
      )}
      <PolicyFAQ />
    </div>
  );
}

// ---------- manager: reserved tables (split-pay holds) ----------
function AdminHolds({ holds, events, bookedOnTable, go, onRelease }) {
  const evById = {};
  (events || []).forEach((e) => (evById[e.id] = e));
  const isLive = (h) =>
    h.status === "held" && new Date(h.expiresAt) > new Date();
  const sorted = [...(holds || [])].sort((a, b) =>
    (b.createdAt || "").localeCompare(a.createdAt || "")
  );
  const live = sorted.filter(isLive);
  const done = sorted.filter((h) => !isLive(h));
  const copy = (h) => {
    const link = groupLink(h.eventId, h.tableName);
    if (navigator.clipboard) navigator.clipboard.writeText(link);
    window.prompt("Share this link so the table fills its open seats:", link);
  };
  const Row = (h) => {
    const ev = evById[h.eventId] || {};
    const booked = bookedOnTable ? bookedOnTable(h.eventId, h.tableName) : 0;
    const statusLabel =
      h.status === "booked" || booked >= h.partySize
        ? "Filled"
        : h.status === "released"
        ? "Released"
        : new Date(h.expiresAt) <= new Date()
        ? "Expired"
        : "Holding";
    return (
      <div key={h.id} className="cc-holdcard">
        <div className="cc-holdcard-head">
          <div>
            <b>{ev.title || "—"}</b>
            <span className="cc-mono"> · {ev.date ? fmtDate(ev.date) : ""} {ev.time ? fmtTime(ev.time) : ""}</span>
          </div>
          <span className={"cc-holdstatus s-" + statusLabel.toLowerCase()}>
            {statusLabel}
          </span>
        </div>
        <div className="cc-holdcard-body">
          <span>Table: <b>{h.tableName}</b></span>
          <span>
            Seats filled: <b>{booked}/{h.partySize}</b>
          </span>
          <span>Open: <b>{Math.max(0, h.partySize - booked)}</b></span>
          {isLive(h) && <span>Time left: <b>{timeLeft(h.expiresAt)}</b></span>}
        </div>
        {isLive(h) && (
          <div className="cc-holdcard-actions">
            <button className="cc-mini" onClick={() => copy(h)}>
              Copy share link
            </button>
            <button
              className="cc-mini danger"
              onClick={() => {
                if (
                  window.confirm(
                    "Release this table's held seats back to general availability?"
                  )
                )
                  onRelease(h.id);
              }}
            >
              Release
            </button>
          </div>
        )}
      </div>
    );
  };
  return (
    <div>
      <button className="cc-back" onClick={() => go("admin")}>
        ← Dashboard
      </button>
      <h2 className="cc-h2">Reserved tables</h2>
      <p className="cc-field-sub" style={{ marginBottom: "16px" }}>
