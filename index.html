<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
  <meta name="theme-color" content="#ffffff"/>
  <title>GREYS Memphis · Staff</title>
  <link rel="icon" href="favicon.ico" sizes="any">
  <link rel="icon" type="image/png" sizes="32x32" href="favicon-32.png">
  <link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3/dist/tabler-icons.min.css">
  <style>
    :root{
      --bg:#06273a; --surface:#ffffff; --ink:#1c1d22; --sub:#7b7e8a; --line:#ecedf2;
      --accent:#5b53d6; --wax:#c0392b; --shadow:0 6px 22px rgba(28,29,34,0.07);
      --lav:#ECE9FB; --lav-i:#5b53d6; --mint:#E1F4EA; --mint-i:#1f9c6b;
      --sky:#E4EEFC; --sky-i:#2f6fd0; --peach:#FCEDE1; --peach-i:#cc7a33;
      --pink:#FBE7F0; --pink-i:#c43d77; --butter:#FBF1D6; --butter-i:#b08a14;
      --gray:#EDEFF3; --gray-i:#5f626d;
      --r:20px;
    }
    *{ box-sizing:border-box; margin:0; padding:0; -webkit-tap-highlight-color:transparent; }
    html,body{ height:100%; }
    body{ font-family:'Plus Jakarta Sans',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif; background:var(--bg); color:var(--ink); }
    .app{ max-width:520px; margin:0 auto; min-height:100vh; background:var(--bg); position:relative; padding-bottom:84px; }

    /* top bar / header */
    .topbar{ display:flex; align-items:center; gap:10px; padding:16px 20px 14px; border-bottom:1px solid rgba(255,255,255,0.12); margin-bottom:4px; }
    .topbar .brand{ font-weight:800; font-size:1.35rem; letter-spacing:-0.3px; color:#ffffff; }
    .topbar .loc{ font-size:0.74rem; color:#b9c5d1; font-weight:600; }
    .topbar .spacer{ flex:1; }
    .icon-btn{ width:40px; height:40px; border-radius:50%; border:none; background:var(--surface); box-shadow:var(--shadow); display:flex; align-items:center; justify-content:center; font-size:1.05rem; cursor:pointer; color:var(--ink); text-decoration:none; }

    /* views */
    .view{ display:none; }
    .view.active{ display:block; }

    /* HOME */
    .home-head{ padding:8px 20px 4px; }
    .home-head h1{ font-size:1.85rem; font-weight:800; letter-spacing:-0.6px; line-height:1.1; color:#ffffff; }
    .home-head .when{ color:#b9c5d1; font-size:0.86rem; font-weight:600; margin-top:4px; }

    .notes-banner{ margin:14px 20px 4px; }
    .note-card{ background:var(--surface); border-radius:16px; box-shadow:var(--shadow); padding:13px 16px; margin-bottom:10px; cursor:pointer; }
    .note-card .nt{ font-weight:700; font-size:0.92rem; display:flex; align-items:center; gap:7px; }
    .note-card .nt .chev{ margin-left:auto; color:var(--sub); font-size:0.8rem; transition:transform .2s; }
    .note-card.open .nt .chev{ transform:rotate(180deg); }
    .note-card .nb{ display:none; font-size:0.88rem; color:var(--ink); line-height:1.5; margin-top:8px; white-space:pre-wrap; }
    .note-card.open .nb{ display:block; }
    .notes-empty{ display:none; }

    .tiles{ display:grid; grid-template-columns:1fr 1fr; gap:14px; padding:14px 20px 2px; }
    .tile{ background:var(--surface); border-radius:4px; box-shadow:0 3px 12px rgba(0,0,0,0.20); padding:10px 16px; cursor:pointer; border:1px solid #d9dce6; text-align:left; transition:transform .08s, box-shadow .08s; display:flex; flex-direction:row; align-items:center; gap:14px; }
    .tile:active{ transform:scale(0.97); }
    .tile.on{ border-color:var(--accent); box-shadow:0 0 0 2px var(--accent), 0 3px 12px rgba(0,0,0,0.20); }
    .tile .ic{ width:34px; height:34px; border-radius:4px; display:flex; align-items:center; justify-content:center; flex-shrink:0; }
    .tile .ic i{ font-size:19px; line-height:1; }
    .tile .tl{ font-weight:700; font-size:1.18rem; letter-spacing:-0.3px; color:var(--ink); line-height:1.15; }
    .tile.full{ grid-column:1 / -1; }
    .badge-soon{ margin-left:auto; font-size:0.64rem; font-weight:700; color:var(--gray-i); background:var(--gray); padding:5px 11px; border-radius:20px; }
    .ic-mint{ background:var(--mint); color:var(--mint-i);} .ic-sky{ background:var(--sky); color:var(--sky-i);}
    .ic-lav{ background:var(--lav); color:var(--lav-i);} .ic-peach{ background:var(--peach); color:var(--peach-i);}
    .ic-pink{ background:var(--pink); color:var(--pink-i);} .ic-butter{ background:var(--butter); color:var(--butter-i);}
    .ic-gray{ background:var(--gray); color:var(--gray-i);}
    .icon-btn i{ font-size:20px; line-height:1; } .home-btn i{ font-size:26px; line-height:1; }
    .home-preview{ margin:12px 20px 4px; background:var(--surface); border-radius:18px; box-shadow:var(--shadow); padding:14px 16px; }
    .pv-head{ display:flex; align-items:center; margin-bottom:6px; }
    .pv-title{ font-weight:800; font-size:0.95rem; }
    .pv-title i{ font-size:17px; vertical-align:-2px; margin-right:5px; color:var(--accent); }
    .pv-all{ margin-left:auto; border:none; background:none; color:var(--accent); font-weight:700; font-size:0.82rem; cursor:pointer; font-family:inherit; }
    .pv-row{ padding:9px 2px; border-top:1px solid var(--line); font-size:0.9rem; cursor:pointer; }
    .pv-row:first-of-type{ border-top:none; }
    .pv-day{ color:var(--accent); font-weight:700; font-size:0.72rem; text-transform:uppercase; margin-right:6px; }
    .pv-empty{ color:var(--sub); font-size:0.86rem; padding:6px 2px; }

    /* section header */
    .sec-head{ position:sticky; top:0; z-index:20; background:var(--bg); display:flex; align-items:center; gap:12px; padding:16px 18px 10px; }
    .back-btn{ width:42px; height:42px; border-radius:50%; border:none; background:var(--surface); box-shadow:var(--shadow); font-size:1.2rem; cursor:pointer; display:flex; align-items:center; justify-content:center; color:var(--ink); }
    .sec-head h2{ font-size:1.5rem; font-weight:800; letter-spacing:-0.5px; color:#ffffff; }
    .sec-body{ padding:6px 18px 20px; }

    /* generic card list */
    .card{ background:var(--surface); border-radius:18px; box-shadow:var(--shadow); padding:16px; margin-bottom:12px; }
    .card .c-top{ display:flex; align-items:center; gap:8px; margin-bottom:2px; }
    .c-day{ font-size:0.72rem; font-weight:800; letter-spacing:0.2px; color:var(--accent); text-transform:uppercase; }
    .c-day.wax{ color:var(--wax); } .c-day.gold{ color:var(--butter-i); }
    .c-title{ font-weight:700; font-size:1.05rem; letter-spacing:-0.2px; margin-top:2px; }
    .c-body{ font-size:0.9rem; color:var(--sub); line-height:1.5; margin-top:5px; }
    .c-pill{ font-size:0.64rem; font-weight:800; text-transform:uppercase; letter-spacing:0.3px; padding:3px 9px; border-radius:20px; }
    .pill-rep{ background:var(--butter); color:var(--butter-i); }
    .empty{ text-align:center; color:var(--sub); padding:48px 20px; font-size:0.92rem; }
    .empty .ic{ font-size:2.4rem; display:block; margin-bottom:10px; }
    .flash{ animation:flash 1.8s ease; }
    @keyframes flash{ 0%,100%{ box-shadow:var(--shadow);} 25%{ box-shadow:0 0 0 3px rgba(91,83,214,0.55);} }

    /* specials accent */
    .card.special{ border-left:4px solid var(--mint-i); }
    .card.special .c-day{ color:var(--mint-i); }
    .card.event{ border-left:4px solid var(--pink-i); }
    .card.event .c-day{ color:var(--pink-i); }
    .card.event.past{ opacity:0.6; }
    .card.sched{ border-left:4px solid var(--peach-i); }
    .card.sched .c-day{ color:var(--peach-i); }
    .card.timeoff{ border-left:4px solid var(--wax); }
    .card.timeoff .c-day{ color:var(--wax); }

    /* reservation cards */
    .res-filters{ display:flex; gap:8px; flex-wrap:wrap; margin-bottom:12px; align-items:flex-end; }
    .fg{ display:flex; flex-direction:column; gap:4px; }
    .fg label{ font-size:0.64rem; font-weight:700; color:var(--sub); text-transform:uppercase; letter-spacing:0.3px; }
    .fg input, .fg select{ padding:9px 11px; border:1px solid var(--line); border-radius:12px; font-size:0.86rem; background:var(--surface); font-family:inherit; color:var(--ink); }
    .btn{ border:none; border-radius:14px; padding:11px 18px; font-size:0.9rem; font-weight:700; cursor:pointer; font-family:inherit; }
    .btn-primary{ background:var(--accent); color:#fff; }
    .btn-block{ width:100%; }
    .res-card{ background:var(--surface); border-radius:16px; box-shadow:var(--shadow); padding:14px 16px; margin-bottom:10px; display:flex; align-items:center; gap:14px; }
    .res-when{ text-align:center; min-width:58px; }
    .res-when .t{ font-weight:800; font-size:0.98rem; }
    .res-when .d{ font-size:0.68rem; color:var(--sub); font-weight:600; }
    .res-main{ flex:1; min-width:0; }
    .res-name{ font-weight:700; font-size:0.98rem; }
    .res-meta{ font-size:0.78rem; color:var(--sub); margin-top:2px; }
    .res-badge{ font-size:0.62rem; font-weight:800; text-transform:uppercase; padding:4px 9px; border-radius:20px; white-space:nowrap; }
    .b-ok{ background:var(--mint); color:var(--mint-i); }
    .b-cancel{ background:#fae3e0; color:var(--wax); }
    .b-other{ background:var(--gray); color:var(--gray-i); }
    .res-stats{ font-size:0.8rem; color:var(--sub); font-weight:600; margin-bottom:10px; }
    .res-card.cancel .res-name{ text-decoration:line-through; color:var(--sub); }
    .res-group{ margin-top:24px; }
    .res-group-title{ font-size:1.05rem; font-weight:800; letter-spacing:-0.3px; color:#ffffff; margin-bottom:10px; }
    .res-group-empty{ font-size:0.86rem; color:#b9c5d1; padding:4px 2px 2px; }
    .home-preview .res-group-empty{ color:var(--sub); }

    /* calendar */
    .cal-bar{ display:flex; align-items:center; gap:10px; margin-bottom:10px; }
    .cal-bar h3{ font-size:1.05rem; font-weight:800; flex:1; text-align:center; }
    .cal-nav{ width:38px; height:38px; border-radius:50%; border:none; background:var(--surface); box-shadow:var(--shadow); font-size:1rem; cursor:pointer; }
    .cal-today{ border:none; background:var(--accent); color:#fff; border-radius:12px; padding:8px 13px; font-weight:700; font-size:0.78rem; cursor:pointer; }
    .cal-legend{ display:flex; flex-wrap:wrap; gap:9px 14px; font-size:0.72rem; color:var(--sub); margin-bottom:12px; }
    .cal-legend .dot{ width:9px; height:9px; border-radius:3px; display:inline-block; margin-right:4px; vertical-align:middle; }
    .cal-grid{ background:var(--surface); border-radius:18px; box-shadow:var(--shadow); overflow:hidden; }
    .cal-hrow,.cal-body{ display:grid; grid-template-columns:repeat(7,1fr); }
    .cal-hcell{ text-align:center; font-size:0.62rem; font-weight:700; color:var(--sub); padding:9px 0; text-transform:uppercase; }
    .cal-day{ min-height:54px; border-top:1px solid var(--line); border-right:1px solid var(--line); padding:4px 4px; position:relative; cursor:pointer; }
    .cal-day.sel{ box-shadow:inset 0 0 0 2px var(--accent); }
    .cal-detail{ background:var(--surface); border-radius:18px; box-shadow:var(--shadow); padding:16px; margin-top:14px; }
    .cd-date{ font-weight:800; font-size:1.0rem; margin-bottom:4px; }
    .cd-block{ margin-top:12px; }
    .cd-lbl{ font-size:0.72rem; font-weight:800; text-transform:uppercase; letter-spacing:0.3px; color:var(--sub); margin-bottom:3px; }
    .cd-item{ font-size:0.9rem; padding:4px 0; line-height:1.35; }
    .cd-x{ color:var(--wax); font-weight:700; }
    .cal-day:nth-child(7n){ border-right:none; }
    .cal-day.other{ background:#fafafe; }
    .cal-daynum{ font-size:0.72rem; font-weight:700; color:var(--ink); }
    .cal-day.other .cal-daynum{ color:#cfd1da; }
    .cal-day.today .cal-daynum{ background:var(--accent); color:#fff; width:20px; height:20px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:0.66rem; }
    .cal-dot{ height:5px; border-radius:3px; margin:2px 1px 0; }
    .cal-more{ font-size:0.56rem; color:var(--sub); margin-top:1px; }
    .cd-res{ background:#9fc0ee; } .cd-cancel{ background:#e6a8a0; } .cd-event{ background:#eaa6c6; }
    .cd-special{ background:#8fd3b2; } .cd-sched{ background:#eac08c; } .cd-off{ background:#d99a90; }
    .ag-day{ background:var(--surface); border-radius:16px; box-shadow:var(--shadow); padding:13px 16px; margin-bottom:12px; }
    .ag-date{ font-weight:800; font-size:0.95rem; margin-bottom:6px; display:flex; align-items:center; }
    .ag-today{ font-size:0.6rem; font-weight:800; background:var(--accent); color:#fff; padding:2px 8px; border-radius:20px; margin-left:7px; text-transform:uppercase; }
    .ag-row{ font-size:0.9rem; padding:7px 0; border-top:1px solid var(--line); display:flex; align-items:flex-start; gap:8px; line-height:1.35; }
    .ag-tag{ font-size:0.58rem; font-weight:800; text-transform:uppercase; letter-spacing:0.2px; padding:3px 8px; border-radius:20px; white-space:nowrap; flex-shrink:0; margin-top:1px; }
    .t-res{ background:#dceafe; color:#2f6fd0; } .t-cancel{ background:#fae3e0; color:var(--wax); }
    .t-event{ background:#fbe7f0; color:#c43d77; } .t-special{ background:#e1f4ea; color:#1f9c6b; }
    .t-sched{ background:#fcede1; color:#cc7a33; } .t-off{ background:#f3e2df; color:var(--wax); }
    .ag-strike{ text-decoration:line-through; color:var(--sub); }

    /* time off form */
    .form-card{ background:var(--surface); border-radius:18px; box-shadow:var(--shadow); padding:18px; margin-bottom:16px; }
    .form-card h3{ font-size:1.0rem; font-weight:800; margin-bottom:14px; }
    .field{ margin-bottom:12px; }
    .field label{ font-size:0.7rem; font-weight:700; color:var(--sub); text-transform:uppercase; letter-spacing:0.3px; display:block; margin-bottom:5px; }
    .field input{ width:100%; padding:12px 13px; border:1px solid var(--line); border-radius:13px; font-size:0.92rem; font-family:inherit; background:#fbfbfe; color:var(--ink); }
    .field input:focus{ outline:none; border-color:var(--accent); }
    .row2{ display:flex; gap:10px; } .row2 .field{ flex:1; }
    .to-msg{ font-size:0.84rem; font-weight:700; margin-top:8px; display:none; }
    .req-item{ display:flex; align-items:flex-start; gap:12px; background:var(--surface); border-radius:16px; box-shadow:var(--shadow); padding:13px 15px; margin-bottom:10px; }
    .req-info{ flex:1; min-width:0; }
    .req-name{ font-weight:700; font-size:0.95rem; }
    .req-meta{ font-size:0.78rem; color:var(--sub); margin-top:2px; }
    .req-reason{ font-size:0.76rem; color:var(--sub); font-style:italic; margin-top:2px; }
    .st-badge{ font-size:0.6rem; font-weight:800; text-transform:uppercase; padding:4px 9px; border-radius:20px; }
    .st-pending{ background:var(--butter); color:var(--butter-i); }
    .st-approved{ background:var(--mint); color:var(--mint-i); }
    .st-denied{ background:#fae3e0; color:var(--wax); }

    .section-label{ font-size:0.74rem; font-weight:800; color:var(--sub); text-transform:uppercase; letter-spacing:0.4px; margin:6px 2px 10px; }

    /* bottom bar */
    .botbar{ position:fixed; left:0; right:0; bottom:0; z-index:40; display:flex; justify-content:center; padding:12px 0 calc(12px + env(safe-area-inset-bottom)); pointer-events:none; }
    .botbar .home-btn{ pointer-events:auto; width:60px; height:60px; border-radius:50%; border:none; background:var(--ink); color:#fff; box-shadow:0 8px 24px rgba(28,29,34,0.28); font-size:1.4rem; cursor:pointer; display:flex; align-items:center; justify-content:center; }
    .botbar .home-btn:active{ transform:scale(0.94); }

    /* loading spinner */
    .spin{ display:inline-block; width:18px; height:18px; border:3px solid var(--line); border-top-color:var(--accent); border-radius:50%; animation:sp .7s linear infinite; vertical-align:middle; }
    @keyframes sp{ to{ transform:rotate(360deg);} }
  </style>
</head>
<body>
<div class="app">

  <!-- TOP BAR -->
  <div class="topbar">
    <div>
      <div class="brand">GREYS Memphis</div>
      <div class="loc">Staff Portal</div>
    </div>
    <div class="spacer"></div>
    <a class="icon-btn" href="manager.html" title="Manager" aria-label="Manager"><i class="ti ti-lock"></i></a>
  </div>

  <!-- ══ HOME ══ -->
  <div id="view-home" class="view active">
    <div class="home-head">
      <h1 id="greeting">Hi, team</h1>
      <div class="when" id="homeWhen"></div>
    </div>

    <div class="notes-banner" id="notesGrid"></div>

    <div class="tiles">
      <button class="tile" id="tile-specials" onclick="tileTap('specials')"><span class="ic ic-mint"><i class="ti ti-tools-kitchen-2"></i></span><span class="tl">Specials</span></button>
      <button class="tile" id="tile-resys" onclick="tileTap('resys')"><span class="ic ic-sky"><i class="ti ti-clipboard-list"></i></span><span class="tl">Resys</span></button>
      <button class="tile" id="tile-calendar" onclick="tileTap('calendar')"><span class="ic ic-lav"><i class="ti ti-calendar-month"></i></span><span class="tl">Calendar</span></button>
      <button class="tile" id="tile-schedule" onclick="tileTap('schedule')"><span class="ic ic-peach"><i class="ti ti-clock-hour-4"></i></span><span class="tl">Schedule</span></button>
      <button class="tile" id="tile-events" onclick="tileTap('events')"><span class="ic ic-pink"><i class="ti ti-confetti"></i></span><span class="tl">Events</span></button>
      <button class="tile" id="tile-requestoff" onclick="tileTap('requestoff')"><span class="ic ic-butter"><i class="ti ti-beach"></i></span><span class="tl">Request Off</span></button>
      <button class="tile full" id="tile-onboarding" onclick="tileTap('onboarding')"><span class="ic ic-gray"><i class="ti ti-user-plus"></i></span><span class="tl">Onboarding</span><span class="badge-soon">Coming soon</span></button>
    </div>
    <div id="homePreview" class="home-preview" style="display:none;"></div>
  </div>

  <!-- ══ SPECIALS ══ -->
  <div id="view-specials" class="view">
    <div class="sec-head"><button class="back-btn" onclick="showView('home')">‹</button><h2>Specials</h2></div>
    <div class="sec-body">
      <div class="section-label">This week · Mon–Sun</div>
      <div id="specialsFullGrid"></div>
    </div>
  </div>

  <!-- ══ RESYS ══ -->
  <div id="view-resys" class="view">
    <div class="sec-head"><button class="back-btn" onclick="showView('home')">‹</button><h2>Reservations</h2></div>
    <div class="sec-body">
      <div class="res-filters">
        <div class="fg"><label>From</label><input type="date" id="dateFrom" /></div>
        <div class="fg"><label>To</label><input type="date" id="dateTo" /></div>
        <div class="fg"><label>Status</label>
          <select id="statusFilter">
            <option value="">All</option><option value="RESERVED">Reserved</option>
            <option value="SEATED">Seated</option><option value="FINISHED">Finished</option>
            <option value="CANCELLED">Cancelled</option><option value="NO_SHOW">No Show</option>
          </select>
        </div>
        <button class="btn btn-primary" onclick="loadReservations()">Apply</button>
        <input type="hidden" id="limitSelect" value="100" />
      </div>
      <div class="res-stats" id="resStats"></div>
      <div id="resState" class="empty"><span class="spin"></span> Loading reservations…</div>
      <div id="resList"></div>
      <div id="resWeekGroup" class="res-group" style="display:none">
        <div class="res-group-title">This Week</div>
        <div id="resWeekList"></div>
      </div>
      <div id="resFutureGroup" class="res-group" style="display:none">
        <div class="res-group-title">Future</div>
        <div id="resFutureList"></div>
      </div>
    </div>
  </div>

  <!-- ══ CALENDAR ══ -->
  <div id="view-calendar" class="view">
    <div class="sec-head"><button class="back-btn" onclick="showView('home')">‹</button><h2>Calendar</h2></div>
    <div class="sec-body">
      <div class="cal-bar">
        <button class="cal-nav" onclick="calNav(-1)">‹</button>
        <h3 id="calMonthLabel">Month Year</h3>
        <button class="cal-nav" onclick="calNav(1)">›</button>
        <button class="cal-today" onclick="calGoToday()">Today</button>
      </div>
      <div id="agendaList" class="agenda"></div>
    </div>
  </div>

  <!-- ══ SCHEDULE ══ -->
  <div id="view-schedule" class="view">
    <div class="sec-head"><button class="back-btn" onclick="showView('home')">‹</button><h2>Schedule</h2></div>
    <div class="sec-body">
      <div id="schedGrid"></div>
    </div>
  </div>

  <!-- ══ EVENTS ══ -->
  <div id="view-events" class="view">
    <div class="sec-head"><button class="back-btn" onclick="showView('home')">‹</button><h2>Events</h2></div>
    <div class="sec-body">
      <div id="eventsGrid"></div>
    </div>
  </div>

function occurrences(item, winStart, winEnd){
  const out=[]; if(!item.date) return out;
  const rep=item.repeat||'none';
  const start=new Date(item.date+'T12:00:00');
  const winS=new Date(winStart+'T12:00:00'), winE=new Date(winEnd+'T12:00:00');
  const until=item.repeatUntil?new Date(item.repeatUntil+'T12:00:00'):winE;
  const hardEnd=until<winE?until:winE;
  if(rep==='none'){ if(start>=winS && start<=winE) out.push(fmt(start)); return out; }
  let d=new Date(start), i=0;
  while(d<=hardEnd && i<600){ if(d>=winS) out.push(fmt(d));
    if(rep==='weekly') d.setDate(d.getDate()+7); else if(rep==='biweekly') d.setDate(d.getDate()+14); else if(rep==='monthly') d.setMonth(d.getMonth()+1); else break; i++; }
  return out;
}
function repeatLabel(r){ return r==='weekly'?'Weekly':r==='biweekly'?'Every 2 wks':r==='monthly'?'Monthly':''; }
function currentWeek(){ const d=new Date(); d.setHours(0,0,0,0); const mon=new Date(d); mon.setDate(d.getDate()-((d.getDay()+6)%7)); const sun=new Date(mon); sun.setDate(mon.getDate()+6); return { start:fmt(mon), end:fmt(sun) }; }

// Shared card markup so the main list and the grouped lists render identically.
function resCardHTML(r){

  return `<div class="res-card${isCancel?' cancel':''}">
      <div class="res-when"><div class="t">${esc(tm)}</div><div class="d">${esc(dd)}</div></div>

      <span class="res-badge ${bcls}">${st.replace(/_/g,' ')}</span>
    </div>`;

// millisecond timestamp of a reservation's start, or null when unparseable
function resStartMs(r){ const s=r&&r.details&&r.details.startDate; const d=s?new Date(s):null; return (d&&!isNaN(d.getTime()))?d.getTime():null; }
// "This Week" = Monday 00:00 (local) of the current week → the following Monday 00:00 (exclusive),
// i.e. Mon–Sun. "Future" = anything on/after next Monday 00:00. Past reservations appear only in the main list.
// Renders into whichever container ids are passed, so both the Resys view and the Home page can reuse it.
function renderResGroupsInto(recs, weekGroupId, weekListId, futureGroupId, futureListId){
  const weekGroup=document.getElementById(weekGroupId), futureGroup=document.getElementById(futureGroupId);
  const weekList=document.getElementById(weekListId), futureList=document.getElementById(futureListId);
  if(!weekGroup||!futureGroup||!weekList||!futureList) return;
  const now=new Date();
  const dow=(now.getDay()+6)%7;                                                     // 0=Mon … 6=Sun
  const weekStart=new Date(now.getFullYear(),now.getMonth(),now.getDate()-dow).getTime();
  const weekEnd=new Date(now.getFullYear(),now.getMonth(),now.getDate()-dow+7).getTime();
  const week=[], future=[];
  for(const r of recs){ const t=resStartMs(r); if(t==null) continue;
    if(t>=weekStart && t<weekEnd) week.push(r);
    else if(t>=weekEnd) future.push(r);
  }
  const byStart=(a,b)=>resStartMs(a)-resStartMs(b);
  week.sort(byStart); future.sort(byStart);
  weekList.innerHTML   = week.length   ? week.map(resCardHTML).join('')   : '<div class="res-group-empty">No reservations this week.</div>';
  futureList.innerHTML = future.length ? future.map(resCardHTML).join('') : '<div class="res-group-empty">No upcoming reservations.</div>';
  weekGroup.style.display='block'; futureGroup.style.display='block';
}

    const now=new Date();
    const dow=(now.getDay()+6)%7;                                                   // 0=Mon … 6=Sun
    const weekStart=new Date(now.getFullYear(),now.getMonth(),now.getDate()-dow);
    const horizonEnd=new Date(now.getFullYear(),now.getMonth(),now.getDate()+180,23,59,59);
    const p=new URLSearchParams(); p.set('paging.limit','100');
    p.set('startDateFrom', weekStart.toISOString());
    p.set('startDateTo', horizonEnd.toISOString());
    const res=await wixFetch(p);
    if(!res.ok) throw new Error('HTTP '+res.status);
    const data=await res.json();
    const recs=(data.reservations||[]).sort((a,b)=>((a.details&&a.details.startDate)||'').localeCompare((b.details&&b.details.startDate)||''));
    if(state) state.style.display='none';
    renderResGroupsInto(recs,'pvResWeekGroup','pvResWeekList','pvResFutureGroup','pvResFutureList');
  }catch(e){ if(state){ state.style.display='block'; state.textContent='⚠️ Could not load reservations.'; } }
}
function renderReservations(recs){
  const state=document.getElementById('resState'), list=document.getElementById('resList'), stats=document.getElementById('resStats');
  if(!recs.length){
    state.style.display='block'; state.innerHTML='<span class="ic">🗓️</span>No reservations in this range.'; list.innerHTML=''; stats.textContent='';
    document.getElementById('resWeekGroup').style.display='none';
    document.getElementById('resFutureGroup').style.display='none';
    return;
  }
  state.style.display='none';
  let guests=0;
  for(const r of recs){ guests+=(r.details&&r.details.partySize)||0; }
  list.innerHTML = recs.map(resCardHTML).join('');
  stats.textContent = recs.length+' reservation'+(recs.length!==1?'s':'')+' · '+guests+' guests';
  renderResGroups(recs);
}

// ═══ CALENDAR ═══
let _calYear=new Date().getFullYear(), _calMonth=new Date().getMonth(), _selDay=null;
let _calData={ res:{}, ev:{}, sp:{}, sch:{}, off:{} };
let _calTarget={ label:'calMonthLabel', list:'agendaList' };   // where the calendar renders: full view or inline home preview
async function loadCalMonth(y,m){
  _calData.res={};
  try{
    const start=new Date(y,m,1), end=new Date(y,m+1,0,23,59,59);
    const p=new URLSearchParams(); p.set('paging.limit','100'); p.set('startDateFrom',start.toISOString()); p.set('startDateTo',end.toISOString());
    const res=await wixFetch(p); if(!res.ok) return;
    const data=await res.json();
    (data.reservations||[]).forEach(r=>{ if(!r.details||!r.details.startDate) return;
      const dt=new Date(r.details.startDate), d=fmt(dt), who=r.reservee||{};
      const name=[who.firstName,who.lastName].filter(Boolean).join(' ')||'Guest';
      (_calData.res[d]=_calData.res[d]||[]).push({ time:dt.toLocaleTimeString('en-US',{hour:'numeric',minute:'2-digit'}), name, party:r.details.partySize||'?', status:r.status||'UNKNOWN', t:dt.getTime() });
    });
    Object.values(_calData.res).forEach(a=>a.sort((x,y)=>x.t-y.t));
  }catch(e){}
}
function spanDays(startDate,endDate,mS,mE,cb){ let d=new Date((startDate<mS?mS:startDate)+'T00:00:00'); const lim=((endDate||startDate)>mE?mE:(endDate||startDate)); const e=new Date(lim+'T00:00:00'); for(;d<=e;d.setDate(d.getDate()+1)) cb(fmt(d)); }
async function renderCalendar(){
  const y=_calYear, m=_calMonth;
  const months=['January','February','March','April','May','June','July','August','September','October','November','December'];
  const labelEl=document.getElementById(_calTarget.label); if(labelEl) labelEl.textContent=months[m]+' '+y;
  await loadCalMonth(y,m);
  const mS=fmt(new Date(y,m,1)), mE=fmt(new Date(y,m+1,0));
  _calData.ev={}; _events.forEach(ev=>occurrences(ev,mS,mE).forEach(d=>{(_calData.ev[d]=_calData.ev[d]||[]).push({name:ev.name,time:ev.time});}));
  _calData.sp={}; _specials.forEach(s=>{ if((s.repeat||'none')==='none'&&s.endDate&&s.endDate>s.date){ spanDays(s.date,s.endDate,mS,mE,k=>{(_calData.sp[k]=_calData.sp[k]||[]).push(s.title);}); } else { occurrences(s,mS,mE).forEach(d=>{(_calData.sp[d]=_calData.sp[d]||[]).push(s.title);}); } });
  _calData.sch={}; _schedules.forEach(s=>{ if(!s.date) return; spanDays(s.date,s.endDate,mS,mE,k=>{(_calData.sch[k]=_calData.sch[k]||[]).push(s.name);}); });
  _calData.off={}; approvedTimeOff().forEach(r=>{ if(!r.date) return; spanDays(r.date,r.endDate,mS,mE,k=>{(_calData.off[k]=_calData.off[k]||[]).push(r.name);}); });
  renderAgenda(y,m);
}
function agRow(tag,label,text){ return '<div class="ag-row"><span class="ag-tag '+tag+'">'+label+'</span><span>'+text+'</span></div>'; }
function renderAgenda(y,m){
  const list=document.getElementById(_calTarget.list); if(!list) return;
  const dim=new Date(y,m+1,0).getDate(), today=fmt(new Date()), can=['CANCELLED','DECLINED','NO_SHOW'];
  const now=new Date(); const startDay=(y===now.getFullYear() && m===now.getMonth()) ? now.getDate() : 1;
  let html='', any=false;
  for(let d=startDay; d<=dim; d++){
    const date=fmt(new Date(y,m,d));
    const res=_calData.res[date]||[], ev=_calData.ev[date]||[], sp=_calData.sp[date]||[], sch=_calData.sch[date]||[], off=_calData.off[date]||[];
    if(!(res.length||ev.length||sp.length||sch.length||off.length)) continue;
    any=true;
    const dl=new Date(date+'T12:00:00').toLocaleDateString('en-US',{weekday:'short',month:'short',day:'numeric'});
    let rows='';
    sp.forEach(t=>rows+=agRow('t-special','Special',esc(t)));
    ev.forEach(e=>rows+=agRow('t-event','Event',esc(e.name)+(e.time?' · '+fmtTime(e.time):'')));
    res.forEach(r=>{ const c=can.includes(r.status); const txt=esc(r.time)+' · '+esc(r.name)+' · 👥'+esc(r.party); rows+=agRow(c?'t-cancel':'t-res', c?'Cancelled':'Reserved', c?'<span class="ag-strike">'+txt+'</span>':txt); });
    sch.forEach(n=>rows+=agRow('t-sched','Schedule',esc(n)));
    off.forEach(n=>rows+=agRow('t-off','Time Off',esc(n)));
    html+='<div class="ag-day"><div class="ag-date">'+dl+(date===today?'<span class="ag-today">Today</span>':'')+'</div>'+rows+'</div>';
  }
  list.innerHTML = any ? html : '<div class="empty"><span class="ic">📅</span>Nothing scheduled this month.</div>';
}
function calNav(dir){ _calMonth+=dir; if(_calMonth>11){_calMonth=0;_calYear++;} if(_calMonth<0){_calMonth=11;_calYear--;} renderCalendar(); }
function calGoToday(){ _calYear=new Date().getFullYear(); _calMonth=new Date().getMonth(); _selDay=fmt(new Date()); renderCalendar(); }
</script>
